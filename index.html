/* ---------- CRAFTING CALCULATOR ---------- */
const CALC_LS="stdtd7_cart_v1";
// Approximate component recipes for breaking intermediates down to raw. Counts are rough (base).
const INTER={
  "Forged Iron":[["Iron",1]],
  "Forged Steel":[["Forged Iron",1],["Coal",1]],
  "Glue":[["Bone",1]],
  "Duct Tape":[["Glue",1],["Cloth Fragment",2]],
  "Gun Powder":[["Coal",1],["Nitrate Powder",1]],
  "Gunpowder":[["Coal",1],["Nitrate Powder",1]],
  "Cement":[["Stone",1]],
  "Concrete Mix":[["Cement",1],["Sand",1],["Stone",1],["Water",1]],
  "Bullet Tip":[["Lead",1]],
  "Bullet Casing":[["Brass",1]],
  "Casing":[["Brass",1]],
  "Cloth":[["Cotton",1]],
  "Short Iron Pipe":[["Forged Iron",1]],
  "Nail":[["Forged Iron",1]],
  "Repair Kit":[["Duct Tape",1],["Oil",1]],
  "Beaker":[["Forged Iron",3]],
  "Cooking Pot":[["Forged Iron",5]]
};
const RAW=new Set(["Wood","Stone","Iron","Coal","Nitrate Powder","Lead","Brass","Oil Shale","Clay Soil","Sand",
  "Bone","Cloth Fragment","Cotton","Feather","Rotting Flesh","Water","Oil","Leather","Mechanical Parts",
  "Electrical Parts","Spring","Paper","Plant Fibers","Acid","Scrap Polymers","Plastic","Raw Meat","Egg",
  "Animal Fat","Honey","Testosterone Extract","Blueberries","Corn","Potato","Mushrooms","Yucca","Goldenrod",
  "Super Corn","Snowberry","Chrysanthemum","Hops","Coffee Beans","Aloe","Pumpkin"]);
function expandRaw(name,qty,depth,acc){
  depth=depth||0;
  if(depth>6||RAW.has(name)||!INTER[name]){acc[name]=(acc[name]||0)+qty;return acc;}
  INTER[name].forEach(([sub,n])=>expandRaw(sub,n*qty,depth+1,acc));
  return acc;
}
function calcRecipes(){
  const R=[];
  (DB.cookbook.recipes||[]).forEach(r=>{
    const mats=(r.ingredients||[]).map(parseMat).filter(Boolean);
    if(mats.length)R.push({name:r.name,station:r.station||"Campfire",req:r.unlock||"",mats:mats,src:"Cookbook"});
  });
  (DB.ammunition.ammo||[]).forEach(a=>{
    const mats=parseMatList(a.craft);
    if(mats.length)R.push({name:a.name,station:"Workbench / inventory",req:a.magazine||"",mats:mats,src:"Ammo"});
  });
  (DB.building.materials||[]).forEach(b=>{
    const mats=parseMatList(b.cost);
    if(mats.length)R.push({name:b.name+" (block)",station:"Inventory",req:"",mats:mats,src:"Building"});
  });
  return R.sort((a,b)=>a.name.localeCompare(b.name));
}
function parseMat(s){
  if(!s)return null;s=String(s).trim();
  let m=s.match(/^(\d+)\s*[x×]?\s+(.+)$/);
  if(m)return{qty:+m[1],name:m[2].trim()};
  m=s.match(/^(.+?)\s*[x×]\s*(\d+)$/);
  if(m)return{qty:+m[2],name:m[1].trim()};
  return{qty:1,name:s};
}
function parseMatList(str){
  if(!str)return[];
  return String(str).split(/\s*[+,]\s*/).map(parseMat).filter(x=>x&&x.name&&!/^(none|craftable|loot)/i.test(x.name));
}
function cartLoad(){try{return JSON.parse(localStorage.getItem(CALC_LS))||[];}catch(e){return[];}}
function cartSave(c){try{localStorage.setItem(CALC_LS,JSON.stringify(c));}catch(e){}}
function pgCalc(m){
  head(m,"CRAFTING CALCULATOR","calc --shopping-list");
  const R=calcRecipes();
  const cart=cartLoad();
  const ctl=el("div","crtwrap");
  ctl.innerHTML="<div class='grp-h'>ADD TO SHOPPING LIST</div>"+
    "<p class='note'>Pick a craftable, set how many, and add it. The list below totals every raw ingredient across your picks. "+
    "Covers "+R.length+" recipes (food, ammo, building blocks) with verified quantities. Counts are base cost — Master Chef and other perks reduce them.</p>";
  const f=el("div","field");f.innerHTML="<label>Item</label>";
  const sel=el("select");sel.style.minWidth="240px";
  R.forEach((r,i)=>{const o=el("option",null,esc(r.name)+"  ["+r.src+"]");o.value=i;sel.appendChild(o);});
  f.appendChild(sel);
  const qty=el("input");qty.type="number";qty.min=1;qty.value=1;qty.style.width="80px";
  f.appendChild(qty);
  const add=el("button","btn","+ Add");
  add.onclick=()=>{const r=R[+sel.value];cart.push({name:r.name,qty:Math.max(1,+qty.value||1),idx:+sel.value});cartSave(cart);go("calc");};
  f.appendChild(add);
  ctl.appendChild(f);
  m.appendChild(ctl);

  // per-item preview
  const prev=el("div","crtwrap");
  const r0=R[+sel.value||0];
  function showPreview(r,n){
    prev.innerHTML="<div class='grp-h'>RECIPE: "+esc(r.name)+"</div>"+
      (r.req?`<div style="margin-bottom:6px"><span class="tag warn">${esc(r.req)}</span> <span class="tag">${esc(r.station)}</span></div>`:`<div style="margin-bottom:6px"><span class="tag">${esc(r.station)}</span></div>`)+
      tbl(["Ingredient","x"+n],r.mats.map(mm=>[esc(mm.name),mm.qty*n]));
  }
  showPreview(r0,+qty.value||1);
  sel.onchange=()=>showPreview(R[+sel.value],+qty.value||1);
  qty.oninput=()=>showPreview(R[+sel.value],+qty.value||1);
  m.appendChild(prev);

  // shopping list totals
  const sl=el("div","crtwrap");
  sl.innerHTML="<div class='grp-h'>SHOPPING LIST</div>";
  if(!cart.length){sl.appendChild(el("div","note","Empty — add items above to build a combined materials list."));}
  else{
    const totals={};
    cart.forEach(item=>{const r=R[item.idx];if(!r)return;r.mats.forEach(mm=>{totals[mm.name]=(totals[mm.name]||0)+mm.qty*item.qty;});});
    // items in cart
    const itemRows=cart.map((item,i)=>{return `<tr><td>${esc(item.name)}</td><td>x${item.qty}</td><td><button class="btn red" data-rm="${i}">✕</button></td></tr>`;});
    const it=elHTML(`<table class="shoplist"><tr><th>Crafting</th><th>Qty</th><th></th></tr>${itemRows.join("")}</table>`);
    sl.appendChild(el("div","note","Queued:"));sl.appendChild(it);
    it.querySelectorAll("[data-rm]").forEach(b=>b.onclick=()=>{cart.splice(+b.dataset.rm,1);cartSave(cart);go("calc");});
    // grand totals — optional recursive breakdown to raw
    const breakdown=localStorage.getItem("stdtd7_calc_raw")==="1";
    let finalTotals=totals;
    if(breakdown){const acc={};Object.keys(totals).forEach(k=>expandRaw(k,totals[k],0,acc));finalTotals=acc;}
    const rows=Object.keys(finalTotals).sort().map(k=>[
      `<b>${esc(k)}</b>`+(breakdown&&!RAW.has(k)&&!INTER[k]?' <span class="tag warn">component</span>':''),
      finalTotals[k]]);
    const tog=el("label","chk"+(breakdown?" done":""));
    const cb=el("input");cb.type="checkbox";cb.checked=breakdown;
    cb.onchange=()=>{localStorage.setItem("stdtd7_calc_raw",cb.checked?"1":"0");go("calc");};
    tog.appendChild(cb);tog.appendChild(el("span",null,"Break intermediates down to raw materials (ore, wood, etc.)"));
    sl.appendChild(el("div","grp-h",breakdown?"TOTAL RAW MATERIALS (component tree expanded)":"TOTAL MATERIALS NEEDED"));
    sl.appendChild(tog);
    sl.appendChild(elHTML(tbl(["Material","Qty"],rows)));
    if(breakdown)sl.appendChild(el("div","note","Component-tree counts are approximate (base amounts before perks/forge discounts). Raw = mined/harvested/looted directly."));
    const clr=el("button","btn red","⟲ Clear list");
    clr.onclick=()=>{cartSave([]);go("calc");};
    sl.appendChild(clr);
  }
  m.appendChild(sl);
}

/* ---------- LOOT / GAMESTAGE CALCULATOR ---------- */
const LOOT_LS="stdtd7_loot_v1";
const BIOMES=[["Pine Forest",0.9],["Plains / Grassland",1.0],["Burnt Forest",1.1],["Snow",1.2],["Desert",1.3],["Wasteland",1.5]];
const DIFF=[["Scavenger (1)",0.75],["Adventurer (2)",0.87],["Nomad (3, default)",1.0],["Warrior (4)",1.13],["Survivalist (5)",1.26],["Insane (6)",1.4]];
function pgLootCalc(m){
  head(m,"LOOT & GAMESTAGE","calc --gamestage --lootstage");
  const cfg=Object.assign({level:member().level,day:7,players:1,diff:2,biome:1,ll:0,died:false,scav:false},
    (()=>{try{return JSON.parse(localStorage.getItem(LOOT_LS))||{};}catch(e){return{};}})());
  const w=el("div","crtwrap");
  w.innerHTML="<div class='grp-h'>INPUTS</div><p class='note'>Gamestage drives horde size & zombie strength. Loot stage drives item quality. "+
    "Formulas are the community-documented model — treat as a close approximation, not exact.</p>";
  function numField(label,key,min,max,step){
    const f=el("div","field");f.innerHTML=`<label>${label}</label>`;
    const i=el("input");i.type="number";i.min=min;i.max=max||"";i.step=step||1;i.value=cfg[key];
    i.oninput=()=>{cfg[key]=+i.value;persist();recalc();};f.appendChild(i);return f;}
  function selField(label,key,opts){
    const f=el("div","field");f.innerHTML=`<label>${label}</label>`;
    const s=el("select");opts.forEach((o,i)=>{const op=el("option",null,o[0]);op.value=i;s.appendChild(op);});
    s.value=cfg[key];s.onchange=()=>{cfg[key]=+s.value;persist();recalc();};f.appendChild(s);return f;}
  const useMe=el("button","btn","↺ Use active survivor (Lv "+member().level+")");
  useMe.onclick=()=>{cfg.level=member().level;const li=w.querySelector("input");if(li)li.value=cfg.level;persist();recalc();};
  w.appendChild(numField("Player level","level",1,300));
  w.appendChild(numField("Days survived","day",0,999));
  w.appendChild(numField("Players (party)","players",1,8));
  w.appendChild(selField("Difficulty","diff",DIFF));
  w.appendChild(selField("Biome","biome",BIOMES));
  w.appendChild(numField("Lucky Looter rank (0-5)","ll",0,5));
  const cks=el("div","field");
  const c1=el("label","chk");const cb1=el("input");cb1.type="checkbox";cb1.checked=cfg.died;cb1.onchange=()=>{cfg.died=cb1.checked;persist();recalc();};c1.appendChild(cb1);c1.appendChild(el("span",null,"Died recently (+loot buff)"));
  const c2=el("label","chk");const cb2=el("input");cb2.type="checkbox";cb2.checked=cfg.scav;cb2.onchange=()=>{cfg.scav=cb2.checked;persist();recalc();};c2.appendChild(cb2);c2.appendChild(el("span",null,"Full Scavenger armor set (+loot)"));
  cks.appendChild(c1);cks.appendChild(c2);w.appendChild(cks);
  w.appendChild(useMe);
  m.appendChild(w);
  const out=el("div","crtwrap");out.id="lcout";m.appendChild(out);

  function persist(){try{localStorage.setItem(LOOT_LS,JSON.stringify(cfg));}catch(e){}}
  function recalc(){
    const diffMult=DIFF[cfg.diff][1], biomeMult=BIOMES[cfg.biome][1];
    const partyBonus=1+0.10*Math.max(0,Math.min(cfg.players,8)-1); // approx MP scaling
    const gsSolo=Math.floor(cfg.level*0.4+cfg.day*0.5);
    const gamestage=Math.floor(gsSolo*diffMult*partyBonus);
    let llPct=0.05*Math.max(0,Math.min(cfg.ll,5));
    if(cfg.scav)llPct+=0.10; // scavenger set approx
    let lootBase=gamestage*(1+llPct);
    if(cfg.died)lootBase+=lootBase*0.25; // died-recently buff approx (5-day)
    const lootStage=Math.floor(lootBase*biomeMult);
    const q=lootStage<20?"Q1–Q2 primitive":lootStage<60?"Q2–Q4 iron tier":lootStage<120?"Q4–Q5 steel tier":lootStage<200?"Q5–Q6, mods common":"Q6 / legendary parts";
    out.innerHTML="<div class='grp-h'>RESULTS</div>"+
      `<div class="metricrow">
        <div class="metric"><div class="k">GAMESTAGE</div><div class="v">${gamestage}</div></div>
        <div class="metric"><div class="k">LOOT STAGE</div><div class="v">${lootStage}</div></div>
        <div class="metric"><div class="k">EXPECTED GEAR</div><div class="v" style="font-size:15px">${q}</div></div>
      </div>`+
      `<table><tr><th>Factor</th><th>Value</th></tr>`+
      `<tr><td>Solo base (lvl×0.4 + day×0.5)</td><td>${gsSolo}</td></tr>`+
      `<tr><td>Difficulty ×</td><td>${DIFF[cfg.diff][0]} → ×${diffMult}</td></tr>`+
      `<tr><td>Party ×</td><td>${cfg.players} players → ×${partyBonus.toFixed(2)}</td></tr>`+
      `<tr><td>Lucky Looter</td><td>rank ${cfg.ll} → +${(0.05*cfg.ll*100).toFixed(0)}% loot${cfg.scav?" (+10% Scavenger set)":""}</td></tr>`+
      `<tr><td>Biome ×</td><td>${BIOMES[cfg.biome][0]} → ×${biomeMult}</td></tr>`+
      `<tr><td>Died-recently buff</td><td>${cfg.died?"+25% loot (active)":"off"}</td></tr>`+
      `</table>`+
      `<div class="note" style="margin-top:6px">Party loot stage = the highest member's; days survived don't affect loot stage (only gamestage). Blood-moon size tracks gamestage — cross-check the Blood Moon Planner.</div>`+
      `<div class="warnbox">Community-documented approximation. In-game values vary with settings (loot abundance, XP multiplier) and patch tweaks.</div>`;
  }
  recalc();
}

}

/* ---------- BASE DESIGNER (v2) ---------- */
const BD_LS="stdtd7_base_v2";
const BD_PAL=[
  {k:"",n:"Erase",c:"transparent",sym:""},
  {k:"w",n:"Wall (concrete)",c:"#5a6a5e",sym:"█"},
  {k:"W",n:"Wall (steel)",c:"#8a97a0",sym:"▓"},
  {k:"f",n:"Walkway/floor",c:"#243026",sym:"·"},
  {k:"r",n:"Ramp/stairs",c:"#3a5a44",sym:"◹"},
  {k:"l",n:"Ladder/pole",c:"#5a7a8a",sym:"‖"},
  {k:"d",n:"Door/Hatch",c:"#7a5a2a",sym:"◫"},
  {k:"s",n:"Spikes",c:"#8a3a2a",sym:"▲"},
  {k:"b",n:"Blade Trap",c:"#c04030",sym:"✳"},
  {k:"a",n:"Dart Trap",c:"#d06a30",sym:"➤"},
  {k:"t",n:"Turret",c:"#c0a030",sym:"⌖"},
  {k:"e",n:"Elec Fence",c:"#4fd6ff",sym:"⌁"},
  {k:"g",n:"Generator",c:"#a060c0",sym:"⚡"},
  {k:"p",n:"Player spot",c:"#39ff87",sym:"★"},
  {k:"c",n:"Loot/storage",c:"#c0c060",sym:"▤"},
  {k:"k",n:"Workstation",c:"#6080c0",sym:"⚒"}
];
const BD_DRAW={b:20,t:15,e:5,a:45,k:0}; // watts consumed per powered element (approx)
const BD_GEN=300; // one generator bank (6 engines)
let BD_SEL="w",BD_TOOL="paint",BD_DIM="16x12";
function bdStore(){try{return JSON.parse(localStorage.getItem(BD_LS))||{};}catch(e){return{};}}
function bdSaveAll(o){try{localStorage.setItem(BD_LS,JSON.stringify(o));}catch(e){}}
function pgBaseDesign(m){
  head(m,"BASE DESIGNER","sketch --horde-base");
  const store=bdStore();
  if(!store.layouts){store.layouts={"Layout 1":{dim:"16x12",cells:{}}};store.active="Layout 1";bdSaveAll(store);}
  if(!store.layouts[store.active])store.active=Object.keys(store.layouts)[0];
  let L=store.layouts[store.active];
  BD_DIM=L.dim||"16x12";
  const [COLS,ROWS]=BD_DIM.split("x").map(Number);
  const colOf=k=>(BD_PAL.find(p=>p.k===k)||{}).c||"transparent";
  const symOf=k=>(BD_PAL.find(p=>p.k===k)||{}).sym||"";

  // layout manager
  const lm=el("div","crtwrap");lm.innerHTML="<div class='grp-h'>LAYOUT</div>";
  const lf=el("div","field");
  const lsel=el("select");Object.keys(store.layouts).forEach(n=>{const o=el("option",null,n);if(n===store.active)o.selected=true;lsel.appendChild(o);});
  lsel.onchange=()=>{store.active=lsel.value;bdSaveAll(store);go("basedesign");};
  lf.appendChild(el("span","kbd","Current:"));lf.appendChild(lsel);
  const nl=el("button","btn","+ New");nl.onclick=()=>{const nm=window.prompt("New layout name:","Layout "+(Object.keys(store.layouts).length+1));if(nm){store.layouts[nm]={dim:BD_DIM,cells:{}};store.active=nm;bdSaveAll(store);go("basedesign");}};
  const rn=el("button","btn","✎ Rename");rn.onclick=()=>{const nm=window.prompt("Rename layout:",store.active);if(nm&&nm!==store.active){store.layouts[nm]=store.layouts[store.active];delete store.layouts[store.active];store.active=nm;bdSaveAll(store);go("basedesign");}};
  const del=el("button","btn red","✕ Delete");del.onclick=()=>{if(Object.keys(store.layouts).length<=1){alert("Keep at least one layout.");return;}if(confirm("Delete "+store.active+"?")){delete store.layouts[store.active];store.active=Object.keys(store.layouts)[0];bdSaveAll(store);go("basedesign");}};
  lf.appendChild(nl);lf.appendChild(rn);lf.appendChild(del);lm.appendChild(lf);
  // grid size
  const df=el("div","field");df.innerHTML="<label>Grid size</label>";
  const dsel=el("select");["12x10","16x12","20x14","24x18","30x20"].forEach(d=>{const o=el("option",null,d);if(d===BD_DIM)o.selected=true;dsel.appendChild(o);});
  dsel.onchange=()=>{L.dim=dsel.value;bdSaveAll(store);go("basedesign");};
  df.appendChild(dsel);df.appendChild(el("span","kbd","cells (W×H)"));lm.appendChild(df);
  m.appendChild(lm);

  // tools + palette
  const ctl=el("div","crtwrap");ctl.innerHTML="<div class='grp-h'>TOOLS</div>";
  const trow=el("div","palette");
  [["paint","✏ Paint"],["rect","▭ Rectangle"],["fill","🪣 Fill area"]].forEach(([k,n])=>{
    const b=el("div","palbtn"+(BD_TOOL===k?" on":""));b.textContent=n;
    b.onclick=()=>{BD_TOOL=k;trow.querySelectorAll(".palbtn").forEach(x=>x.classList.remove("on"));b.classList.add("on");rectStart=null;};
    trow.appendChild(b);
  });
  ctl.appendChild(trow);
  ctl.appendChild(el("div","grp-h","BLOCKS & TRAPS"));
  const pal=el("div","palette");
  BD_PAL.forEach(p=>{
    const b=el("div","palbtn"+(BD_SEL===p.k?" on":""));
    b.innerHTML=`<span class="sw" style="background:${p.c==="transparent"?"repeating-linear-gradient(45deg,#222,#222 3px,#333 3px,#333 6px)":p.c}"></span>${esc(p.n)}`;
    b.onclick=()=>{BD_SEL=p.k;pal.querySelectorAll(".palbtn").forEach(x=>x.classList.remove("on"));b.classList.add("on");};
    pal.appendChild(b);
  });
  ctl.appendChild(pal);
  const clr=el("button","btn red","⟲ Clear this layout");
  clr.onclick=()=>{if(confirm("Clear all cells in "+store.active+"?")){L.cells={};bdSaveAll(store);go("basedesign");}};
  ctl.appendChild(clr);
  m.appendChild(ctl);

  // grid
  const w=el("div","crtwrap");
  const g=el("div","grid");g.style.gridTemplateColumns=`repeat(${COLS},1fr)`;
  g.style.maxWidth=Math.min(680,COLS*34)+"px";
  let painting=false,rectStart=null;
  function setCell(i,val){if(val)L.cells[i]=val;else delete L.cells[i];}
  function drawCell(cell,i){const v=L.cells[i]||"";cell.style.background=colOf(v);cell.textContent=symOf(v);}
  function commit(){bdSaveAll(store);updateTally();}
  function paintOne(i,cell){setCell(i,BD_SEL);drawCell(cell,i);commit();}
  function fillArea(i){const target=L.cells[i]||"";if(target===BD_SEL)return;const stack=[i],seen={};
    while(stack.length){const c=stack.pop();if(seen[c])continue;seen[c]=1;if((L.cells[c]||"")!==target)continue;setCell(c,BD_SEL);
      const x=c%COLS,y=(c/COLS)|0;[[x-1,y],[x+1,y],[x,y-1],[x,y+1]].forEach(([nx,ny])=>{if(nx>=0&&nx<COLS&&ny>=0&&ny<ROWS)stack.push(ny*COLS+nx);});}
    redraw();commit();}
  function rectFill(a,b){const ax=a%COLS,ay=(a/COLS)|0,bx=b%COLS,by=(b/COLS)|0;
    for(let y=Math.min(ay,by);y<=Math.max(ay,by);y++)for(let x=Math.min(ax,bx);x<=Math.max(ax,bx);x++)setCell(y*COLS+x,BD_SEL);
    redraw();commit();}
  const cells=[];
  function redraw(){cells.forEach((c,i)=>drawCell(c,i));}
  for(let i=0;i<ROWS*COLS;i++){
    const cell=el("div","cell");cells.push(cell);drawCell(cell,i);
    cell.onmousedown=()=>{if(BD_TOOL==="paint"){painting=true;paintOne(i,cell);}};
    cell.onmouseenter=()=>{if(painting&&BD_TOOL==="paint")paintOne(i,cell);};
    cell.onclick=()=>{
      if(BD_TOOL==="fill")fillArea(i);
      else if(BD_TOOL==="rect"){if(rectStart==null){rectStart=i;cell.style.outline="2px solid var(--grn)";}else{rectFill(rectStart,i);rectStart=null;}}
      else paintOne(i,cell);
    };
    g.appendChild(cell);
  }
  document.addEventListener("mouseup",()=>{painting=false;});
  // touch support
  g.addEventListener("touchstart",e=>{if(BD_TOOL!=="paint")return;painting=true;tpaint(e);e.preventDefault();},{passive:false});
  g.addEventListener("touchmove",e=>{if(painting)tpaint(e);e.preventDefault();},{passive:false});
  g.addEventListener("touchend",()=>{painting=false;});
  function tpaint(e){const t=e.touches[0];const elx=document.elementFromPoint(t.clientX,t.clientY);const i=cells.indexOf(elx);if(i>=0)paintOne(i,cells[i]);}
  w.appendChild(g);
  const leg=el("div","rmline");
  BD_PAL.filter(p=>p.k).forEach(p=>{leg.appendChild(elHTML(`<span><span class="sw" style="display:inline-block;width:12px;height:12px;border-radius:2px;background:${p.c};text-align:center;font-size:10px">${p.sym}</span>${esc(p.n)}</span>`));});
  w.appendChild(leg);
  m.appendChild(w);

  // live tally
  const tally=el("div","crtwrap");tally.id="bdtally";m.appendChild(tally);
  function updateTally(){
    const counts={};Object.values(L.cells).forEach(v=>{counts[v]=(counts[v]||0)+1;});
    let draw=0,gens=0;
    Object.keys(counts).forEach(k=>{if(BD_DRAW[k])draw+=BD_DRAW[k]*counts[k];if(k==="g")gens+=counts[k];});
    const cap=gens*BD_GEN;const over=draw>cap;
    const rows=BD_PAL.filter(p=>p.k&&counts[p.k]).map(p=>[`<span class="sw" style="display:inline-block;width:12px;height:12px;border-radius:2px;background:${p.c};vertical-align:middle"></span> ${esc(p.n)}`,counts[p.k],BD_DRAW[p.k]?BD_DRAW[p.k]*counts[p.k]+"W":"—"]);
    tally.innerHTML="<div class='grp-h'>ELEMENT TALLY & POWER</div>"+
      `<div class="metricrow">
        <div class="metric"><div class="k">POWER DRAW</div><div class="v" style="${over?'color:var(--red)':''}">${draw}W</div></div>
        <div class="metric"><div class="k">GENERATOR CAP</div><div class="v">${cap}W</div></div>
        <div class="metric"><div class="k">GENERATORS</div><div class="v">${gens}</div></div>
      </div>`+
      (rows.length?tbl(["Element","Count","Power"],rows):"<div class='note'>Empty — start painting.</div>")+
      (over?`<div class="warnbox">Over budget by ${draw-cap}W — add ${Math.ceil((draw-cap)/BD_GEN)} more generator bank(s) or split circuits.</div>`:
        gens?`<div class="note">Within power budget. One Generator Bank = ~300W (6 engines).</div>`:"");
  }
  updateTally();
  m.appendChild(el("div","note","Classic horde design: a 1-wide Walkway funnels zombies single-file past Blade Traps / Electric Fence, Player spot behind a Door/Hatch, Generator powering it. Rectangle tool is great for laying walls & floors fast."));
}

      card.appendChild(sr);
      const gf=el("div","field");gf.style.marginTop="8px";gf.innerHTML="<label style='min-width:60px'>PSN ID</label>";
      const gi=el("input");gi.value=c.gamertag||"";gi.placeholder="your gamertag";gi.oninput=()=>{c.gamertag=gi.value;save();};
      gf.appendChild(gi);card.appendChild(gf);
    }else{
      const sw=el("button","btn");sw.textContent="Set as me";sw.style.marginTop="8px";sw.style.fontSize="11px";sw.style.padding="3px 9px";
      sw.onclick=()=>{STATE.active=i;save();go("crewhub");};card.appendChild(sw);
    }
    grid.appendChild(card);
  });
  rw.appendChild(grid);
  const addb=el("button","btn","+ Add member");addb.style.marginTop="10px";
  addb.onclick=()=>{STATE.crew.push(blankMember("Survivor "+(STATE.crew.length+1)));save();go("crewhub");};
  rw.appendChild(addb);
  m.appendChild(rw);
}

/* ---------- PLAY SCHEDULE ---------- */
function pgSchedule(m){
  head(m,"PLAY SCHEDULE","schedule --sessions --rsvp");
  m.appendChild(el("div","note","Propose play sessions and RSVP. Sessions travel in the crew invite link — after you RSVP, re-share your link so the organizer sees your pick. You're RSVPing as: "+esc(member().name)));
  // add session
  const add=el("div","crtwrap");add.innerHTML="<div class='grp-h'>PROPOSE A SESSION</div>";
  const f1=el("div","field");f1.innerHTML="<label>Date & time</label>";
  const dt=el("input");dt.type="datetime-local";f1.appendChild(dt);
  const f2=el("div","field");f2.innerHTML="<label>Note</label>";
  const nt=el("input");nt.placeholder="e.g. Blood Moon night 7 / horde base build";nt.style.minWidth="240px";f2.appendChild(nt);
  const ab=el("button","btn","+ Add session");
  ab.onclick=()=>{if(!dt.value){alert("Pick a date & time.");return;}
    STATE.schedule.push({id:"s"+Date.now()+Math.floor(Math.random()*999),when:dt.value,note:nt.value,rsvp:{}});save();go("schedule");};
  add.appendChild(f1);add.appendChild(f2);add.appendChild(ab);m.appendChild(add);

  // sessions list
  const list=(STATE.schedule||[]).slice().sort((a,b)=>(Date.parse(a.when)||0)-(Date.parse(b.when)||0));
  const w=el("div","crtwrap");w.innerHTML="<div class='grp-h'>SESSIONS ("+list.length+")</div>";
  if(!list.length)w.appendChild(el("div","note","No sessions yet. Propose one above, then share the crew invite link."));
  const meName=member().name;
  list.forEach(s=>{
    const box=el("div","sess");
    const yes=[],maybe=[],no=[];
    Object.keys(s.rsvp||{}).forEach(n=>{const v=s.rsvp[n];(v==="yes"?yes:v==="maybe"?maybe:no).push(n);});
    box.innerHTML=`<div style="display:flex;justify-content:space-between;gap:8px;align-items:flex-start">
        <div><div class="when">${esc(fmtWhen(s.when))}</div>${s.note?`<div class="note">${esc(s.note)}</div>`:""}</div></div>`+
      `<div class="tallybar"><span style="color:var(--grn)">✓ ${yes.length} in</span><span style="color:var(--amber)">? ${maybe.length} maybe</span><span style="color:var(--red)">✕ ${no.length} out</span></div>`+
      (yes.length?`<div class="note">In: ${esc(yes.join(", "))}</div>`:"");
    const rb=el("div","rsvpbtns");
    [["yes","✓ I'm in"],["maybe","? Maybe"],["no","✕ Can't"]].forEach(([v,lab])=>{
      const b=el("span","rb "+v+((s.rsvp&&s.rsvp[meName]===v)?" on":""));b.textContent=lab;
      b.onclick=()=>{if(!s.rsvp)s.rsvp={};s.rsvp[meName]=v;save();go("schedule");};
      rb.appendChild(b);
    });
    box.appendChild(rb);
    const del=el("button","btn red","✕ Remove");del.style.cssText="margin-top:8px;font-size:11px;padding:3px 9px";
    del.onclick=()=>{STATE.schedule=STATE.schedule.filter(x=>x.id!==s.id);save();go("schedule");};
    box.appendChild(del);
    w.appendChild(box);
  });
  m.appendChild(w);
  const share=el("div","crtwrap");
  share.innerHTML="<div class='grp-h'>SHARE UPDATES</div><p class='note'>After RSVPing, send your crew link so others see your availability.</p>";
  const sb=el("button","btn","🔗 Copy crew link");sb.onclick=doInvite;share.appendChild(sb);
  m.appendChild(share);
}

/* ---------- boot sequence ---------- */
const BOOT=[
 "NAVEZGANE BIOS v3.0.1 ............ OK",
 "Mounting /dev/wasteland .......... OK",
 "Loading perk matrix (5 attrs x 10) OK",
 "Loading compendium: weapons, tools, armor, mods, books ... OK",
 "Loading threat database .......... OK",
 "Calibrating skill-point ledger ... OK",
 "Crossplay handshake (PS5) ........ OK",
 "",
 "  SURVIVOR TERMINAL // 7 DAYS TO DIE",
 "  \"Dead Hot Summer\" build console",
 "",
 "Press any key to enter_"
];
function runBoot(){
  const b=$("#boot");let i=0,line=0,txt="";
  function tick(){
    if(line>=BOOT.length){b.innerHTML=txt+'<span class="cur">█</span>';enter();return;}
    txt+=BOOT[line]+"\n";b.innerHTML=txt+'<span class="cur">█</span>';line++;
    setTimeout(tick,line<8?150:400);
  }
  function enter(){const done=()=>{b.classList.add("hidden");$("#app").classList.remove("hidden");applyTheme(currentTheme());checkImport();buildNav();render();};
    document.addEventListener("keydown",done,{once:true});
    b.addEventListener("click",done,{once:true});
    setTimeout(done,4000);}
  tick();
}
runBoot();
</script>
