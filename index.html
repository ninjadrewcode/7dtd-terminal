<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>SURVIVOR TERMINAL // 7DTD</title>
<style>
:root{
  --bg:#050a06; --panel:#0a140c; --panel2:#0d1a10; --line:#123a1c;
  --grn:#39ff87; --grn2:#1fae5a; --dim:#5a8a68; --amber:#ffc234; --red:#ff4d4d;
  --cyan:#4fd6ff; --txt:#c8f7d6; --mut:#6d9d7c;
  --mono:"SFMono-Regular",Consolas,"Liberation Mono",Menlo,monospace;
}
*{box-sizing:border-box}
html,body{margin:0;padding:0;background:var(--bg);color:var(--txt);font-family:var(--mono);font-size:15px;line-height:1.5}
body{background-image:radial-gradient(circle at 50% -10%,#0c1c11 0,var(--bg) 60%);min-height:100vh}
/* scanline overlay */
body::after{content:"";position:fixed;inset:0;pointer-events:none;z-index:9999;
  background:repeating-linear-gradient(to bottom,rgba(0,0,0,0) 0,rgba(0,0,0,0) 2px,rgba(0,0,0,.18) 3px,rgba(0,0,0,0) 4px);
  mix-blend-mode:multiply;opacity:.5}
a{color:var(--cyan);text-decoration:none}
h1,h2,h3{font-weight:700;letter-spacing:.04em}
::selection{background:var(--grn);color:#001}
/* boot */
#boot{position:fixed;inset:0;background:var(--bg);z-index:10000;padding:6vh 6vw;white-space:pre-wrap;color:var(--grn);font-size:14px;overflow:hidden}
#boot .cur{animation:blink 1s steps(1) infinite}
@keyframes blink{50%{opacity:0}}
.hidden{display:none!important}
/* layout */
#app{display:flex;min-height:100vh}
#nav{width:220px;flex:0 0 220px;background:var(--panel);border-right:1px solid var(--line);position:sticky;top:0;height:100vh;overflow-y:auto;padding:14px 0}
#nav .brand{padding:0 16px 12px;border-bottom:1px solid var(--line);margin-bottom:10px}
#nav .brand b{color:var(--grn);font-size:16px;text-shadow:0 0 8px var(--grn2)}
#nav .brand small{color:var(--mut);display:block;font-size:11px;margin-top:3px}
.burger{display:none;background:var(--panel2);border:1px solid var(--grn2);color:var(--grn);font-family:var(--mono);font-size:14px;padding:8px 14px;border-radius:4px;cursor:pointer;letter-spacing:.05em}
.navbtn{display:flex;align-items:center;gap:9px;width:100%;text-align:left;background:none;border:0;border-left:3px solid transparent;color:var(--dim);font-family:var(--mono);font-size:13.5px;padding:8px 14px;cursor:pointer;letter-spacing:.03em}
.navbtn:hover{color:var(--txt);background:var(--panel2)}
.navbtn.active{color:var(--grn);border-left-color:var(--grn);background:var(--panel2);text-shadow:0 0 6px var(--grn2)}
.navbtn .ic{width:16px;text-align:center;opacity:.9}
.navsec{color:var(--mut);font-size:10px;letter-spacing:.2em;padding:12px 16px 4px}
.navsearch{padding:8px 12px 10px;border-bottom:1px solid var(--line);margin-bottom:6px}
.navsearch input{width:100%;background:var(--bg);border:1px solid var(--line);color:var(--txt);font-family:var(--mono);font-size:12.5px;padding:7px 9px;border-radius:3px}
.navsearch input:focus{outline:none;border-color:var(--grn)}
.srlist{display:flex;flex-direction:column;gap:6px}
.srhit{display:flex;justify-content:space-between;gap:10px;align-items:center;background:var(--panel);border:1px solid var(--line);border-radius:4px;padding:8px 11px;cursor:pointer}
.srhit:hover{background:#0f2214;border-color:var(--grn2)}
.srhit .nm{color:var(--grn);font-size:13.5px}
.srhit .sub{color:var(--mut);font-size:11px}
.srhit .pg{color:var(--cyan);font-size:11px;white-space:nowrap}
.shoplist td .btn{padding:2px 8px}
#main{flex:1;min-width:0;padding:22px 30px 80px;max-width:1200px}
.crtwrap{border:1px solid var(--line);background:linear-gradient(180deg,var(--panel2),var(--panel));border-radius:4px;padding:16px 18px;margin-bottom:16px;box-shadow:inset 0 0 40px rgba(20,60,30,.15)}
.pg-h{color:var(--grn);font-size:22px;margin:0 0 3px;text-shadow:0 0 10px var(--grn2)}
.pg-sub{color:var(--mut);font-size:12.5px;margin:0 0 14px}
.prompt{color:var(--grn2)}
/* tables */
table{width:100%;border-collapse:collapse;font-size:12.5px;margin:6px 0}
th{text-align:left;color:var(--amber);border-bottom:1px solid var(--line);padding:7px 8px;font-weight:700;letter-spacing:.03em;position:sticky;top:0;background:var(--panel)}
td{padding:6px 8px;border-bottom:1px solid rgba(18,58,28,.5);vertical-align:top}
tr:hover td{background:rgba(30,120,60,.06)}
.tag{display:inline-block;font-size:10.5px;padding:1px 7px;border:1px solid var(--line);border-radius:10px;color:var(--grn2);background:rgba(30,120,60,.08);white-space:nowrap}
.tag.att{color:var(--cyan);border-color:#134a5a}
.tag.warn{color:var(--amber);border-color:#5a4a13}
.grp-h{color:var(--cyan);font-size:15px;margin:20px 0 4px;border-bottom:1px dashed var(--line);padding-bottom:4px}
.note{color:var(--mut);font-size:12px;font-style:italic}
.cardgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:12px}
/* perk builder */
.attrbar{display:flex;flex-wrap:wrap;gap:10px;margin:10px 0 4px}
.attrbox{flex:1;min-width:150px;background:var(--panel);border:1px solid var(--line);border-radius:4px;padding:9px 11px}
.attrbox .nm{color:var(--grn);font-size:13px;letter-spacing:.05em}
.attrbox .lv{font-size:26px;color:var(--txt);text-align:center;margin:2px 0}
.stepper{display:flex;gap:6px;justify-content:center}
.stepper button{width:34px;height:30px;background:var(--panel2);border:1px solid var(--line);color:var(--grn);font-size:16px;cursor:pointer;border-radius:3px;font-family:var(--mono)}
.stepper button:hover:not(:disabled){background:#123a1c}
.stepper button:disabled{opacity:.3;cursor:not-allowed}
.budget{display:flex;flex-wrap:wrap;gap:18px;align-items:center;font-size:13px}
.budget b{font-size:20px}
.budget .ok{color:var(--grn)} .budget .over{color:var(--red)}
.bar{height:8px;background:var(--panel);border:1px solid var(--line);border-radius:4px;overflow:hidden;flex:1;min-width:120px}
.bar>i{display:block;height:100%;background:linear-gradient(90deg,var(--grn2),var(--grn));transition:width .2s}
.bar.over>i{background:linear-gradient(90deg,#a11,#ff4d4d)}
.perkcard{background:var(--panel);border:1px solid var(--line);border-radius:4px;overflow:hidden}
.perkcard .ph{display:flex;justify-content:space-between;align-items:center;gap:8px;padding:9px 11px;cursor:pointer;background:var(--panel2)}
.perkcard .ph:hover{background:#0f2214}
.perkcard .pn{color:var(--grn);font-size:14px}
.perkcard .pd{color:var(--mut);font-size:11.5px;margin-top:2px}
.pips{display:flex;gap:3px}
.pip{width:14px;height:14px;border:1px solid var(--line);border-radius:2px;background:var(--bg)}
.pip.on{background:var(--grn);box-shadow:0 0 6px var(--grn2)}
.pip.locked{border-style:dashed;opacity:.5}
.perkbody{padding:0 11px;max-height:0;overflow:hidden;transition:max-height .25s}
.perkbody.open{max-height:900px;padding:8px 11px 12px}
.ranklist{list-style:none;margin:0;padding:0}
.ranklist li{display:flex;gap:9px;align-items:flex-start;padding:5px 0;border-bottom:1px solid rgba(18,58,28,.4);font-size:12px}
.ranklist .rk{color:var(--amber);flex:0 0 26px}
.ranklist .gate{flex:0 0 58px}
.ranklist .ef{flex:1;color:var(--txt)}
.rowbtns{display:flex;gap:6px;margin-top:9px}
.btn{background:var(--panel2);border:1px solid var(--line);color:var(--grn);font-family:var(--mono);font-size:12px;padding:5px 11px;border-radius:3px;cursor:pointer}
.btn:hover:not(:disabled){background:#123a1c}
.btn:disabled{opacity:.35;cursor:not-allowed}
.btn.red{color:var(--red);border-color:#5a1313}
.btn.amber{color:var(--amber);border-color:#5a4a13}
.perk-locked{opacity:.55}
.metricrow{display:flex;flex-wrap:wrap;gap:12px;margin:4px 0}
.metric{background:var(--panel);border:1px solid var(--line);border-radius:4px;padding:10px 14px;min-width:120px}
.metric .k{color:var(--mut);font-size:11px;letter-spacing:.08em}
.metric .v{color:var(--grn);font-size:24px}
.field{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin:6px 0}
.field label{color:var(--mut);font-size:12px;min-width:90px}
input,select{background:var(--bg);border:1px solid var(--line);color:var(--txt);font-family:var(--mono);font-size:13px;padding:6px 9px;border-radius:3px}
input[type=number]{width:90px}
.chk{display:flex;align-items:center;gap:8px;font-size:12.5px;padding:3px 0;cursor:pointer}
.chk input{width:16px;height:16px;accent-color:var(--grn)}
.chk.done span{color:var(--mut);text-decoration:line-through}
.pill{font-size:10.5px;padding:1px 8px;border-radius:10px;border:1px solid var(--line);color:var(--mut)}
.rolechip{display:inline-block;font-size:11.5px;padding:3px 10px;margin:3px 4px 3px 0;border:1px solid var(--line);border-radius:12px;color:var(--dim);background:var(--bg);cursor:pointer;user-select:none}
.rolechip.on{color:#001;background:var(--grn);border-color:var(--grn);font-weight:500}
.covrow{display:flex;flex-wrap:wrap;gap:6px;margin:4px 0}
.covcell{font-size:11.5px;padding:4px 10px;border:1px solid var(--line);border-radius:4px}
.covcell.gap{border-color:#5a1313;color:var(--red)}
.covcell.ok{border-color:var(--grn2);color:var(--grn)}
.palette{display:flex;flex-wrap:wrap;gap:6px;margin:6px 0}
.palbtn{display:flex;align-items:center;gap:6px;font-size:12px;padding:5px 10px;border:1px solid var(--line);border-radius:4px;cursor:pointer;color:var(--txt);background:var(--panel)}
.palbtn.on{border-color:var(--grn);box-shadow:0 0 6px var(--grn2)}
.palbtn .sw{width:14px;height:14px;border-radius:3px;border:1px solid rgba(255,255,255,.2)}
.grid{display:grid;gap:2px;margin:8px 0;touch-action:none;max-width:560px}
.cell{width:100%;aspect-ratio:1;border:1px solid #0c1c11;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:12px;color:rgba(0,0,0,.75);line-height:1;user-select:none}
.rmline{display:flex;flex-wrap:wrap;gap:14px;margin-top:8px;font-size:11.5px}
.rmline span{display:flex;align-items:center;gap:5px}
.tl{border-left:2px solid var(--grn2);padding:6px 0 6px 14px;margin-left:6px}
.tl .day{color:var(--amber);font-size:13px}
.tl .ph{color:var(--cyan);font-size:14px;margin-bottom:2px}
.tiles{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:10px;margin:6px 0}
.tile{background:var(--panel);border:1px solid var(--line);border-radius:6px;padding:14px;cursor:pointer;transition:transform .12s,border-color .12s,box-shadow .12s}
.tile:hover{border-color:var(--grn);transform:translateY(-2px);box-shadow:0 4px 14px rgba(30,120,60,.18)}
.tile .ic{font-size:22px}
.tile .tn{color:var(--grn);font-size:14px;margin:6px 0 2px}
.tile .td{color:var(--mut);font-size:11px;line-height:1.4}
.dot{display:inline-block;width:9px;height:9px;border-radius:50%;margin-right:5px;vertical-align:middle}
.rostercard{background:var(--panel);border:1px solid var(--line);border-radius:6px;padding:12px 14px}
.rostercard.me{border-color:var(--grn2)}
.statusrow{display:flex;gap:5px;flex-wrap:wrap;margin-top:8px}
.statusrow .sbtn{font-size:11px;padding:3px 9px;border:1px solid var(--line);border-radius:12px;cursor:pointer;color:var(--dim);background:var(--bg)}
.statusrow .sbtn.on{color:#001;font-weight:500}
.sess{background:var(--panel);border:1px solid var(--line);border-left:3px solid var(--grn2);border-radius:0 4px 4px 0;padding:11px 13px;margin:8px 0}
.sess .when{color:var(--grn);font-size:15px}
.rsvpbtns{display:flex;gap:6px;margin-top:8px;flex-wrap:wrap}
.rsvpbtns .rb{font-size:12px;padding:4px 12px;border:1px solid var(--line);border-radius:4px;cursor:pointer;color:var(--dim);background:var(--bg)}
.rsvpbtns .rb.yes.on{background:var(--grn);color:#001;border-color:var(--grn)}
.rsvpbtns .rb.maybe.on{background:var(--amber);color:#001;border-color:var(--amber)}
.rsvpbtns .rb.no.on{background:var(--red);color:#fff;border-color:var(--red)}
.tallybar{display:flex;gap:12px;font-size:12px;margin-top:6px;color:var(--mut)}
.banner{background:linear-gradient(90deg,rgba(30,120,60,.14),transparent);border:1px solid var(--line);border-left:3px solid var(--grn);border-radius:0 6px 6px 0;padding:12px 16px;margin-bottom:14px}
.banner .cn{color:var(--grn);font-size:20px;text-shadow:0 0 10px var(--grn2)}
.tabbar{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:10px}
.tabbar .t{background:var(--panel);border:1px solid var(--line);color:var(--dim);padding:5px 12px;font-size:12px;cursor:pointer;border-radius:3px}
.tabbar .t.active{color:var(--grn);border-color:var(--grn)}
.searchbox{width:100%;max-width:320px;margin-bottom:6px}
details.acc{border:1px solid var(--line);border-radius:4px;margin:8px 0;background:var(--panel)}
details.acc>summary{cursor:pointer;padding:9px 12px;color:var(--cyan);font-size:14px;list-style:none}
details.acc>summary::-webkit-details-marker{display:none}
details.acc>summary::before{content:"▸ ";color:var(--grn2)}
details.acc[open]>summary::before{content:"▾ "}
details.acc .inner{padding:0 12px 12px}
.kbd{font-size:11px;color:var(--mut)}
.foot{color:var(--mut);font-size:11px;border-top:1px solid var(--line);margin-top:24px;padding-top:12px}
.warnbox{border:1px solid #5a4a13;background:rgba(90,74,19,.12);color:var(--amber);padding:8px 12px;border-radius:4px;font-size:12px;margin:8px 0}
.chain{display:flex;align-items:stretch;gap:0;overflow-x:auto;padding:6px 0 10px}
.chain .node{flex:0 0 190px;background:var(--panel);border:1px solid var(--line);border-radius:4px;padding:9px 11px;position:relative}
.chain .node+.node{margin-left:24px}
.chain .node+.node::before{content:"▶";position:absolute;left:-19px;top:50%;transform:translateY(-50%);color:var(--grn2);font-size:12px}
.chain .tr{color:var(--amber);font-size:10.5px;letter-spacing:.08em}
.chain .nm{color:var(--grn);font-size:13.5px;margin:2px 0 4px}
.chain .how{color:var(--mut);font-size:11px}
.chain .why{color:var(--txt);font-size:11px;margin-top:4px;border-top:1px solid rgba(18,58,28,.5);padding-top:4px}
.linehdr{display:flex;flex-wrap:wrap;gap:8px;align-items:center;margin-top:16px}
.linehdr .lname{color:var(--cyan);font-size:15px}
@media(max-width:760px){
  #app{flex-direction:column}
  #nav{width:100%;flex:none;height:auto;position:sticky;top:0;z-index:50;padding:10px 8px;background:var(--panel)}
  #nav .brand{margin-bottom:0;padding-bottom:10px;position:relative;display:flex;flex-direction:column}
  .burger{display:inline-block;position:absolute;right:8px;top:2px}
  /* collapsed by default on mobile: hide search + links until opened */
  #nav .navsearch,#nav .navsec,#nav .navbtn{display:none}
  #nav.open .navsearch{display:block}
  #nav.open .navsec{display:block}
  #nav.open .navbtn{display:flex;width:100%;border-left:3px solid transparent;padding:10px 14px;font-size:15px}
  #nav.open{max-height:88vh;overflow-y:auto;border-bottom:1px solid var(--line)}
  #main{padding:16px}
}
@media(min-width:761px){ #nav{display:block!important} }
@media print{
  body::after{display:none}
  #nav,.foot,.pg-sub{display:none!important}
  #main{padding:0;max-width:100%}
  .crtwrap{border:1px solid #999;box-shadow:none;background:#fff!important;page-break-inside:avoid}
  body,html{background:#fff!important;color:#000!important}
  .pg-h,.grp-h,h2{color:#000!important;text-shadow:none!important}
  .note,.kbd{color:#444!important}
  .printsheet .grp-h{color:#000!important;text-transform:uppercase;border-bottom:1px solid #ccc}
  .printsheet p{color:#000!important}
  .crtwrap:not(.printsheet){display:none} /* only print the sheet */
  .printsheet{display:block!important}
}
</style>
</head>
<body>
<div id="boot"></div>
<div id="app" class="hidden">
  <nav id="nav"></nav>
  <main id="main"></main>
</div>
<script>

usher"},{"series":"Sharp Sticks (Spears)","levels":75,"unlocks":"wooden/stone spear -> iron spear -> steel spear","boostedBy":"Spear Master"},{"series":"Furious Fists (Knuckles)","levels":75,"unlocks":"leather knuckle wraps -> iron -> steel knuckles","boostedBy":"The Brawler"}],"keyMaterials":[{"name":"Duct Tape","howToGet":"craft: 1 Glue + 1 Cloth Fragment (no station); also loot. Used in nearly every gun/tool/vehicle recipe"},{"name":"Glue","howToGet":"chem station: 5 Bones + 1 Water; or 3 Ear of Super Corn + 1 Water (needs Adv Engineering); also loot/trader"},{"name":"Forged Iron","howToGet":"Forge: smelted iron + clay soil. Iron from scrapping/wrenching metal items or mining iron ore"},{"name":"Forged Steel","howToGet":"Forge WITH Crucible (Forge Ahead 75): smelted iron + clay + coal; also loot/trader/Steel Smithing"},{"name":"Mechanical Parts","howToGet":"wrench/ratchet vehicles, engines, machines; scrap mechanical items (door knobs, tools)"},{"name":"Electrical Parts","howToGet":"wrench air conditioners, lamps, electronics; scrap electrical items and devices"},{"name":"Springs","howToGet":"wrench cars/mattresses/office chairs; scrap trampolines; loot. Not craftable"},{"name":"Gun Powder","howToGet":"chem station (fastest) or backpack: 1 Nitrate Powder + 1 Coal; both mined in caves/surface nodes"},{"name":"Cement","howToGet":"Forge: smelt Small Stones into cement (needs fuel)"},{"name":"Concrete Mix","howToGet":"Cement Mixer: 1 Crushed Sand + 1 Small Stone + 1 Cement; upgrades rebar/block frames to concrete"},{"name":"Cloth Fragment","howToGet":"craft from 2 Cotton; scrap clothing, curtains, furniture"},{"name":"Leather","howToGet":"scrap animal hides, leather furniture, car seats; harvest large animals"},{"name":"Scrap Polymers","howToGet":"scrap plastic items (buckets, chairs, bottles); wrench car bumpers; harvest tires"},{"name":"Brass","howToGet":"scrap trophies, faucets, door handles, bullet casings; wrench radiators. Forge-melt for casings. Not mineable"},{"name":"Lead","howToGet":"mine lead ore (desert/wasteland common); scrap car batteries, wheel weights; forge into bullet tips"},{"name":"Nails","howToGet":"craft from Forged Iron (forge or backpack); loot hardware stores. Needed for Workbench and wood upgrades"},{"name":"Bottle of Acid","howToGet":"loot only (cars, chemistry sets, garages); needed for chem station, batteries, Recog, military fiber"},{"name":"Water Filter","howToGet":"loot/trader only; one per Dew Collector - effectively caps how many collectors you can build"}]},"zombies":{"category":"Zombies & Threats","source":"7daystodie.wiki.gg (verified vs V2.x pages, some pages flagged outdated for 3.0)","variantSystem":"Feral (orange eyes), Radiated (green, regen 2.5 HP/s to 80% max), plus 2.0: Charged (blue, fast) and Infernal (orange, tanky)","zombies":[{"name":"Walker (slim: Arlene/Marlene/Joe/Steve/Nurse/Party Girl/Tom Clark/Businessman)","type":"normal/feral/radiated/charged","health":"125 (feral 500, rad 800, charged 1000)","damage":"low","behavior":"faster movement than normal class","drops":"ZPack chance (bags of loot)","threat":"low","notes":"slim class; most lack Infernal variant"},{"name":"Walker (normal: Boe/Moe/Yo/Darlene/Janitor/Lab Worker)","type":"normal/feral/radiated/charged/infernal","health":"200 (feral 550, rad 900, charged 1100, infernal 1700)","damage":"average","behavior":"standard melee swipe; can crouch through 1x1 gaps since 2.0","drops":"ZPack chance","threat":"low","notes":"+/-15% HP variance on all human zombies"},{"name":"Utility Worker","type":"normal/feral/radiated/charged/infernal","health":"225 (feral 700, rad 1100, charged 1300, infernal 1900)","damage":"increased block damage","behavior":"20% damage resistance","drops":"ZPack chance","threat":"medium","notes":"common at construction/utility POIs in groups"},{"name":"Crawler","type":"normal/feral","health":"200 (feral 300)","damage":"average","behavior":"crawls; low profile, easy to miss in grass/debris, hard to headshot","drops":"ZPack chance","threat":"low","notes":"more common in Burnt Forest"},{"name":"Spider Zombie","type":"normal/feral/radiated/charged/infernal","health":"125 (feral 500, rad 800, charged 1000, infernal 1600)","damage":"low-avg","behavior":"leaping attack, climbs walls, distinct shrieks; more spawns outside at night","drops":"ZPack chance","threat":"medium","notes":"can leap onto roofs/bases"},{"name":"Cop Zombie","type":"normal/feral/radiated/infernal","health":"450 (feral 950, rad 1700, infernal 2500)","damage":"high; ranged acid spit","behavior":"spits acid at range; bloats and explodes at low health","drops":"ZPack chance","threat":"high","notes":"Wasteland, Blood Moons, police stations; kill before it detonates"},{"name":"Screamer","type":"normal/feral/radiated/charged","health":"250 (feral 500, rad 700, charged 2200)","damage":"low","behavior":"spawns from heatmap activity; scream summons hordes, can chain-call more","drops":"ZPack chance","threat":"high","notes":"kill quietly/fast before she screams; can call zombie bears later"},{"name":"Demolition Zombie (Demolisher)","type":"normal only","health":"1200","damage":"very high block damage + explosion","behavior":"C4 charge on chest explodes if trigger is shot; sprints at bases","drops":"ZPack chance","threat":"high","notes":"high-gamestage Blood Moons and cities; avoid hitting chest trigger"},{"name":"Wight","type":"feral baseline/radiated/charged/infernal","health":"1200 (rad 2200, charged 2400, infernal 3000)","damage":"high","behavior":"fast 'fit' class, huge HP pool","drops":"ZPack chance","threat":"high","notes":"Wasteland, Blood Moons, military POIs; no slow 'normal' variant"},{"name":"Soldier","type":"normal/feral/radiated/infernal","health":"250 (feral 800, rad 1400, infernal 2200)","damage":"average","behavior":"50% damage resistance makes it much tankier than HP suggests","drops":"ZPack chance","threat":"medium","notes":"military/government POIs, roaming military hordes, boss rooms"},{"name":"Biker","type":"normal/feral/radiated/infernal","health":"600 (feral 900, rad 1600, infernal 2400)","damage":"high","behavior":"20% damage resistance, slow strong class","drops":"ZPack chance","threat":"medium","notes":"garages, bars, POI 'boss' spawns"},{"name":"Tourist / Bowler","type":"normal/feral/radiated/infernal","health":"450 (feral 950, rad 1700, infernal 2500)","damage":"high, slow","behavior":"strong class; Bowler is a reskin","drops":"ZPack chance","threat":"medium","notes":"spawns everywhere"},{"name":"Lumberjack","type":"normal/feral/radiated/infernal","health":"450 (feral 950, rad 1700, infernal 2500)","damage":"high, slow","behavior":"strong class","drops":"ZPack chance; chance of rare items","threat":"medium","notes":"any biome, iconic in Snow"},{"name":"Big Mama","type":"normal/feral/radiated/infernal","health":"450 (feral 950, rad 1700, infernal 2500)","damage":"high, slow","behavior":"strong class","drops":"ZPack chance","threat":"medium","notes":"spawns everywhere"},{"name":"Thug","type":"normal/feral/radiated/charged/infernal","health":"250 (feral 800, rad 1400, charged 1600, infernal 2200)","damage":"above average","behavior":"fit class: faster with more HP","drops":"ZPack chance","threat":"medium","notes":"spawns everywhere"},{"name":"Burnt Zombie","type":"normal/feral/radiated/charged/infernal","health":"125 (feral 500, rad 800, charged 1000, infernal 1600)","damage":"low","behavior":"slim class","drops":"ZPack chance","threat":"low","notes":"Burnt Forest, Wasteland, fire-damaged POIs in any biome"},{"name":"Hazmat Zombie","type":"normal/feral/radiated/charged/infernal","health":"200 (feral 550, rad 900, charged 1100, infernal 1700)","damage":"average","behavior":"attacks add 10x more infection than other zombies","drops":"ZPack chance","threat":"medium","notes":"military/gov installations and roaming military hordes"},{"name":"Mutated Zombie","type":"normal/feral/radiated/charged/infernal","health":"950 (feral 1200, rad 2100, charged 2500, infernal 3100)","damage":"high + radioactive acid spray AoE","behavior":"sprays radioactive acid around itself","drops":"ZPack chance","threat":"high","notes":"Wasteland signature; 2.0+ spawns in the wild, 2.6+ variants outside POIs"},{"name":"Zombie Rancher","type":"normal/feral/radiated/charged/infernal","health":"450 (feral 950, rad 1700, charged 1900, infernal 2500)","damage":"high + ranged insect swarms","behavior":"spits Insect Swarms (10 HP each, 20% infection chance per hit)","drops":"ZPack chance","threat":"high","notes":"Desert-only special + Blood Moons; added in 2.x"},{"name":"Zombie Chuck","type":"normal/feral/radiated/charged/infernal","health":"900 (feral 1200, rad 2000, charged 2400, infernal 3000)","damage":"very high ranged boulder throw","behavior":"throws high-damage boulders","drops":"ZPack chance","threat":"high","notes":"Snow-only special + Blood Moons; added in 2.x"},{"name":"Zombie Dog","type":"normal only","health":"200","damage":"medium, frequent bleed","behavior":"very fast, spawns in packs, unaffected by daylight","drops":"Rotting Flesh (harvest)","threat":"high","notes":"common in Snow (night) and Wasteland; deadly early game"},{"name":"Zombie Vulture","type":"normal/radiated","health":"30 (rad 120)","damage":"low, hit-and-run","behavior":"flies, dive-bombs then retreats; radiated spits acid; swarms vehicles on Blood Moon","drops":"Rotting Flesh (harvest)","threat":"medium","notes":"all biomes except Snow; common Desert/Wasteland"},{"name":"Zombie Bear","type":"normal only","health":"4000","damage":"very high","behavior":"attacks anything on sight; screamers can call them at high gamestage","drops":"Rotting Flesh (harvest)","threat":"high","notes":"Wasteland and specific POIs"},{"name":"Grace (boss boar)","type":"unique","health":"3000","damage":"very high charge","behavior":"giant zombified boar","drops":"large meat/flesh harvest","threat":"high","notes":"only at Bob's Boars & Carl's Corn / Hogzilla Ranch POIs"}],"animals":[{"name":"Wolf","hostile":true,"health":"150-250","approx":true,"notes":"Desert/Snow; fast, often in pairs"},{"name":"Dire Wolf","hostile":true,"health":"~600","approx":true,"notes":"larger, tougher wolf; Snow night, Wasteland day/night"},{"name":"Bear","hostile":true,"health":"~850-900","approx":true,"notes":"Snow; huge damage, harvest bonanza if you win"},{"name":"Mountain Lion","hostile":true,"health":"~150","approx":true,"notes":"Snow/Desert; leaping pounce attack"},{"name":"Coyote","hostile":true,"health":"~75","approx":true,"notes":"Desert/Burnt Forest; weak pack predator"},{"name":"Rattlesnake","hostile":true,"health":"~25-30","approx":true,"notes":"ground ambush, can inflict criticals; all warm biomes"},{"name":"Boar","hostile":true,"health":"~120","approx":true,"notes":"aggressive when approached; good meat source"},{"name":"Rabbit / Chicken","hostile":false,"health":"trivial","notes":"passive; meat, feathers, eggs from nests"},{"name":"Doe / Stag","hostile":false,"health":"~125-150","approx":true,"notes":"passive, flee; primary early meat/leather source"},{"name":"Little Bear","hostile":false,"health":"low","approx":true,"notes":"Snow cub; killing may be near an adult bear"}],"mechanics":["Gamestage = (player level + days alive, capped at level, -2/death) x 1.2; drives horde size, sleeper difficulty, variant spawn rates","Loot Stage is separate: player level + perks/gear (Lucky Looter, Treasure Hunter mod) + biome bonus; party uses highest looter's stage","Blood Moon every 7 days (configurable): 22:00-04:00 endless gamestage-scaled waves; zombies always sprint and target players","Blood Moon party gamestage: highest member x1.0, next x0.5, next x0.25...; vultures swarm anyone driving vehicles","Feral Sense setting: zombies get heightened detection Day/Night/All; separate from Feral variant zombies","Infection: from critical hits; +~0.3%/min untreated; stage 2 (14%) -25% stam regen, stage 3 (57%) -1 all attributes, 100% = death (~7 days)","Infection cures: Honey -5%, Herbal Antibiotics -10%, Antibiotics -25%; Vitamins prevent new infection; Brawler punch prevents per-zombie","2.0 Storm's Brewing: biome storms (ember/sand/snow/radiation) with siren warning, 2 stages, stage 2 deals -2 to -4 HP/s; must shelter","During storms all zombies run and ZPack drop chance +5%; vehicles steer worse; clothing insulation extends storm timer 30s per point","2.0 also added Charged/Infernal variants, Rancher/Chuck/Mutated specials, wandering military hordes, and zombies crouching through 1x1 gaps","Screamers: heatmap activity (forges, campfires, gunfire, augers) past a threshold spawns one; her scream calls a horde and can chain","Radiated+ regen (2.5 HP/s to 80%) is disabled by the Rad Remover weapon mod; also works on Charged and Infernal","Fall damage only ever removes half a zombie's HP but stuns it (triple damage while stunned); zombies climb ladders and pile-jump walls"]},"locations":{"category":"Locations & World","source":"7daystodie.wiki.gg Biome/Traders/Storms/Wasteland pages (2.x-3.0 era)","biomes":[{"name":"Pine Forest","difficulty":"baseline (0 skulls); no gamestage or loot bonus","hazards":"none; Thunderstorm is the only storm and is non-hazardous","resources":"wood, stone, iron, plant fibers, cotton, goldenrod/chrysanthemum, eggs/feathers, easy hunting","notes":"always the starting biome; Trader Rekt; Navezgane city: Diersville"},{"name":"Burnt Forest","difficulty":"easy-plus (~half skull); small gamestage/loot bonus","approx":true,"hazards":"Smoke air hazard (3-min timer); Ember Storm: stamina drain then -2 HP/s; reducer: Black Lung Serum, gear: Smoke Gear","resources":"coal from embers and burnt trees, nitrate, mushrooms, wood","notes":"Burnt Zombie home; Trader Jen; Navezgane city: Gravestowne"},{"name":"Desert","difficulty":"medium (~1 skull); moderate gamestage/loot bonus","approx":true,"hazards":"Blowing Sands; Sand Storm: hydration drain, -10% move/reload, then -2 HP/s; reducer: Sunstroke Tonic, gear: Desert Gear","resources":"OIL SHALE (exclusive, replaces coal), sand, yucca, aloe vera, wood from dead pines","notes":"Zombie Rancher special; Trader Bob; Navezgane city: Departure; 95-105F"},{"name":"Snow","difficulty":"hard (1.5 skulls); gamestage bonus increased in 2.6","approx":true,"hazards":"Freezing Air; Snow Storm: fullness drain, -15% move/reload, then -2 HP/s; reducer: Scorcher Stew, gear: Snow Gear","resources":"coal ore, lead, nitrate, iron, huge wood from sawmills, blueberries, snow for water","notes":"Zombie Chuck special, dire wolves/bears; Trader Hugh; city: Perishton"},{"name":"Wasteland","difficulty":"hardest (2 skulls); +50 gamestage bonus, 5x gamestage modifier (2.6); biggest loot stage bonus","hazards":"Blowing Fallout to Radiation; Radiation Storm: -50 max HP/stam, +200% item wear, then -4 HP/s; gear: Radiation Gear; landmines everywhere","resources":"richest loot; scrap iron from cinder blocks/scrap piles, lead ore, radiated mushrooms","notes":"Mutated Zombies, wights, demolishers, zombie bears/dogs; near-instant night respawns; Trader Joel"}],"traders":[{"name":"Rekt","specialty":"Food and Seeds","locationBias":"Pine Forest (always your first trader)","notes":"rude; open 04:05-21:50 like all traders"},{"name":"Jen","specialty":"Medical supplies","locationBias":"Burnt Forest","notes":"buy antibiotics/first aid here"},{"name":"Bob","specialty":"Tools and Vehicle parts","locationBias":"Desert","notes":"good for augers, engines, vehicle mods"},{"name":"Hugh","specialty":"Weapons and Ammo","locationBias":"Snow","notes":"guns and ammunition stockpiles"},{"name":"Joel","specialty":"Armor","locationBias":"Wasteland","notes":"endgame armor pieces"}],"poiTypes":[{"type":"Tier 1 (1 skull)","examples":"small houses, gas stations, sheds, small stores","notes":"5-15 zombies; quick clears, low loot"},{"type":"Tier 2 (2 skulls)","examples":"diners, motels, small offices, pop-n-pills shops","notes":"modest dungeon paths"},{"type":"Tier 3 (3 skulls)","examples":"Shotgun Messiah stores, larger businesses, fire stations","notes":"real dungeon crawls with ambush rooms"},{"type":"Tier 4 (4 skulls)","examples":"Shamway factory, hospitals, high-rises, army camps","notes":"long routes, ferals in sleeper volumes"},{"type":"Tier 5 (5 skulls)","examples":"Dishong Tower, Higashi Tower, factories, prisons","notes":"hour-plus clears, best loot rooms; T6 quests reuse T5 POIs as Infested"},{"type":"Trader compounds","examples":"one per town/city outskirts (not Old West)","notes":"indestructible, closed 21:50-04:05, quest hub + vending machines"},{"type":"3.0 additions","examples":"60+ new POIs added in V3.0 Dead Hot Summer plus new POI sign system","approx":true,"notes":"per 3.0 patch coverage; wiki pages still being updated for 3.0"}],"questTypes":[{"type":"Buried Supplies (T1-3)","rewards":"2500 XP; 250/500/1000 dukes + item choice","notes":"dig in shrinking circle; zombies spawn while digging and on opening stash"},{"type":"Fetch (T1-6)","rewards":"2500-20000 XP; 100-3000 dukes + item choice","notes":"grab White River satchel from POI; each party member needs their own"},{"type":"Clear Zombies (T1-6)","rewards":"3000-24000 XP; 400-4000 dukes + item choice","notes":"kill all zombies marked on compass"},{"type":"Fetch and Clear (T2-6)","rewards":"5060-27000 XP; 700-5000 dukes + item choice","notes":"combo of both objectives"},{"type":"Restore Power (T2-4, night only)","rewards":"5060-8400 XP; 800-2000 dukes","notes":"start 22:00-01:00; crank generators (first attempt always fails), clear zombies"},{"type":"Infested Clear (T2-6)","rewards":"5625-30000 XP; 1000-6000 dukes + Infested Cache (ammo + Q6 item)","notes":"way more zombies, ferals/radiated; uses POI one tier lower"},{"type":"Open Trade Routes","rewards":"500 XP + item choice","notes":"unlocked per completed tier; sends you to the next biome's trader"},{"type":"Skill points?","rewards":"trader quests give XP/dukes/items, NOT skill points; skill points come from leveling and Challenges","notes":"Daring Adventurer perk: +10 trader stage/level, lvl 4 = pick 2 rewards, +5% dukes/level"}],"mechanics":["Quest tiers 1-6: next tier unlocks at 10/20/30/40/50/60 points; a quest awards points equal to its tier; progress shared across traders","Quest Limiter (2.4+): only 3 quests/day count toward tier progression by default","Quest tier = POI skull tier (T6 uses T5 POIs as Infested); activating a quest resets the POI and refills loot","Loot stage = level + perks/gear + biome bonus; Wasteland has the largest bonus (2.2 restored biome loot bonuses after 2.0 tried caps)","Biome Progression (2.0+): 3-min air hazard timer outside Pine Forest; shelter/reducer drinks extend it; biome gear grants immunity","Storm sheltering (2.0): a structure enclosed on all sides and above (closed doors count) pauses storm damage and regens the timer","Landmarks worth marking: traders, surface ore nodes, gas stations, Crack-a-Book (mags), Shotgun Messiah, Pop-N-Pills, intact cars","Biome order for progression: Pine Forest -> Burnt Forest -> Desert -> Snow -> Wasteland (matches trade route quests and hazard escalation)"]},"mining":{"category":"Mining, Resources & Materials","source":"7daystodie.wiki.gg Mining/Biome/Building Block pages","ores":[{"name":"Iron Ore","biomeBias":"all biomes; abundant everywhere underground","surfaceIndicator":"boulder with rusty red-brown streaks","uses":"forged iron -> tools, iron armor, bullet casings (with brass), traps, cobble-to-rebar builds","toolTip":"Iron/Steel Pickaxe or Auger"},{"name":"Lead Ore","biomeBias":"all biomes; notably rich in Wasteland and Snow","surfaceIndicator":"boulder with dull dark-gray metallic flecks","uses":"bullet tips for all ammo, radiation gear crafting","toolTip":"Pickaxe/Auger; also scrap from car batteries and wheel weights"},{"name":"Coal Ore","biomeBias":"all biomes except Desert; surface-rich in Burnt Forest (embers, burnt trees) and Snow","surfaceIndicator":"boulder with black chunks embedded","uses":"gunpowder (with nitrate), fuel, torches, ink","toolTip":"Pickaxe/Auger"},{"name":"Potassium Nitrate","biomeBias":"all biomes; common in Burnt Forest and Snow; also cave stalactites/stalagmites","surfaceIndicator":"boulder with white crystalline veins","uses":"gunpowder (with coal), first aid crafting chain","toolTip":"Pickaxe/Auger"},{"name":"Oil Shale","biomeBias":"DESERT ONLY - replaces coal there","surfaceIndicator":"sandy tan boulder with dark oily bands","uses":"gas cans (chem station), fuel for vehicles/generators/auger","toolTip":"Pickaxe/Auger; dig in desert sand valleys"}],"surfaceIndicatorNote":{"approx":true,"text":"node visuals paraphrased from wiki node images; each node has 2-3 ore blocks directly beneath and often marks a big deposit"},"gatherables":[{"name":"Stone (Small Stone)","how":"surface boulders, loose stones, any stone terrain; pickaxes/stone axe"},{"name":"Wood","how":"trees (pine/oak/spruce/burnt), shrubs, driftwood; fire axe or chainsaw; Mother Lode boosts yield"},{"name":"Clay Soil","how":"dig normal ground/dirt in forest with a shovel; needed for forge molds and farm plots"},{"name":"Sand (Crushed Sand)","how":"dig desert sand or riverbanks with shovel; smelts into glass in forge"},{"name":"Glass","how":"forge-smelt sand, or scrap looted bottles/jars/windows"},{"name":"Scrap Iron","how":"wrench/ratchet cars, salvage appliances, mine Wasteland cinder blocks and scrap piles"},{"name":"Brass","how":"no ore: wrench radiators/faucets, scrap door knobs, trophies, candlesticks; smelt Dukes tokens"},{"name":"Lead (scrap)","how":"car batteries, wheel weights, fishing sinkers, or mine Lead Ore"},{"name":"Gravel","how":"gravel roads and underground gravel veins (shovel); yields stone+sand; underground gravel leads to ore"}],"buildingMaterials":[{"name":"Building Block (wood frame)","hp":"50","upgradeCost":"craft: 2 wood; upgrade to Wood Block: 8 wood","notes":"placeable shape frame; only block you can pick back up - great for scaffolding/nerd-poling"},{"name":"Wood Block","hp":"250","approx":true,"upgradeCost":"upgrade to Cobblestone: 10 Cobblestone Rocks","notes":"day-1 walls; burns; upgrade path: frame -> wood -> cobble -> concrete -> steel"},{"name":"Cobblestone Block","hp":"1500","approx":true,"upgradeCost":"upgrade to Concrete: 10 Concrete Mix","notes":"cobblestone rocks = stone + clay; solid week-1 horde base material"},{"name":"Concrete Block","hp":"5000","approx":true,"upgradeCost":"upgrade to Steel: 10 Forged Steel","notes":"needs cement (forge) + mixer for concrete mix; no more wet/dry cure stage in modern versions"},{"name":"Steel Block","hp":"10000","approx":true,"upgradeCost":"final stage; repair with Forged Steel","notes":"forged steel needs Crucible + Advanced Engineering; best HP per block"}],"mechanics":["Tool efficiency ratio (wiki): 4 Stone Axe = 3 Iron Pickaxe = 2 Steel Pickaxe = 1 Auger; auger also digs dirt/gravel fast","Ore blocks always border gravel or more ore, never sit alone in stone: 'follow the gravel' underground to chain deposits","Any ore appears in any biome EXCEPT Oil Shale (desert-only, replaces coal); surface nodes mark large mixed deposits below","Structural integrity: blocks need support; wide unsupported caves collapse and can kill you - keep pillar blocks handy","Dig tunnels narrow in clay/sand/gravel; mining under POIs can collapse them; bring torch/mining helmet light","Strategy: dig at a surface node to bedrock, then branch-mine along gravel; base miners often live at level ~30-40 depth safe from wanderers","Miner 69'er (STR): +block damage, less stamina; Mother Lode (STR): +harvest yield - level both for 2x speed AND 2x ore","Art of Mining book series: find gems/silver/gold in ore, compact stacks, cave-in damage reduction, chance to one-shot ore blocks","Heads-up: augers and heavy mining generate heatmap activity that attracts Screamers - fight or mine quietly with a pickaxe","Screamer-farm trick: some players deliberately mine loudly near a kill corridor to farm ZPacks from called hordes (adva st","resources":"Coal, Nitrate Powder, Mushrooms, Wood","notes":"Burn Victim zombies; Trader Jen; city Gravestowne"},{"name":"Desert","climate":"Hot ~95-105F, sand storms","difficulty":"Moderate","hazards":"Blowing Sands -> Suffocating; reducer Sunstroke Tonic, Desert Gear immunity","loot":"Moderate bonus","resources":"Oil Shale, Crushed Sand, Aloe Vera, Yucca Fruit","notes":"Zombie Rancher; Trader Bob; city Departure"},{"name":"Snow (Snowy Forest)","climate":"Freezing ~28-32F, snow storms","difficulty":"High","hazards":"Freezing Air -> Suffocating; reducer Scorcher Stew, Snow Gear immunity","loot":"High (boosted in v2.6)","resources":"Coal ore, Snowballs, Blueberries, Wood","notes":"Bear/Dire Wolf/Mtn Lion, Zombie Chuck; Trader Hugh; city Perishton"},{"name":"Wasteland","climate":"60-90F ambient, radiation storms, heat/cold spells","difficulty":"Hardest (end-game)","hazards":"Blowing Fallout -> Radiation; reducer Fallout Flush, Radiation Gear immunity","loot":"Highest loot stage in game","resources":"Iron scrap, Lead, Radiated Mushrooms, cinder-block stone","notes":"Mutated/irradiated zombies, Zombie Bears; Trader Joel; unnamed city"}],"poiTypes":[{"name":"Houses / Cabins","tier":"T1-T2","notes":"Food, basic tools, meds, ammo scraps; low danger, good starter clears"},{"name":"Working Stiffs (hardware/tools)","tier":"T1-T4","notes":"Tools, building mats, mechanical/electrical parts, Working Stiffs crates"},{"name":"Shamway (grocery)","tier":"T2-T3","notes":"Food, cooking supplies, some ammo; warehouse variants larger"},{"name":"Pass N Gas (gas stations)","tier":"T1-T2","notes":"Gas cans, oil, mechanical parts; quick loot stops"},{"name":"Pop-N-Pills (pharmacy)","tier":"T2-T3","notes":"Meds, first aid, chemicals, honey"},{"name":"Crack-a-Book (book stores)","tier":"T2-T3","notes":"Skill magazines, schematics, paper; Crack-a-Book HQ is a large tower dungeon"},{"name":"Shotgun Messiah (gun store)","tier":"T2-T4","notes":"Guns, ammo, gun parts, weapon mods; factory variant is high tier"},{"name":"Savage Country (sporting goods)","tier":"T2-T4","notes":"Bows, hunting/archery gear, ammo, camping"},{"name":"Bob's Boars (ranch/farm)","tier":"T2-T3","notes":"Farming supplies, animal fat, food, seeds"},{"name":"Higashi Pharmaceutical (office/lab)","tier":"T3-T4","notes":"High-tier meds, chems, loot rooms; HQ is a top-tier landmark dungeon"},{"name":"Army Base / Camp","tier":"T3-T5","notes":"Guns, ammo, military loot; landmines around perimeter"},{"name":"Apartments / Office Towers","tier":"T3-T5","notes":"Mixed high loot, dense sleeper volumes, vertical crawls"},{"name":"Factories","tier":"T3-T5","notes":"Bulk materials, ammo, weapon crates; long multi-room clears"},{"name":"Landmark Dungeons (Dishong Tower, Higashi HQ, Shotgun Messiah Factory)","tier":"T5 / tier 6-7","notes":"End-game loot, radiated/boss zombies, very high danger"}],"namedLocations":[{"name":"Diersville","type":"City (Pine Forest)","notes":"Starter-area city; Trader Rekt nearby"},{"name":"Gravestowne","type":"City (Burnt Forest)","notes":"Trader Jen nearby"},{"name":"Departure","type":"City (Desert)","notes":"Trader Bob nearby"},{"name":"Perishton","type":"City (Snow)","notes":"Largest/most dangerous named city; Trader Hugh nearby"},{"name":"Trailer Park","type":"Town","notes":"Small minor-town location"},{"name":"Old Western Town","type":"Town (abandoned)","notes":"No trader spawns here"},{"name":"Bomb Shelter","type":"Landmark POI","notes":"Navezgane underground bunker prefab"},{"name":"Crater Lake","type":"Landmark","notes":"Notable Navezgane water/terrain feature"},{"name":"Dishong Tower","type":"Landmark dungeon","notes":"Iconic tall multi-floor T5/6 skyscraper crawl"},{"name":"Higashi Pharmaceutical HQ","type":"Landmark dungeon","notes":"Top-tier pharma office dungeon"},{"name":"Wasteland City (Navezgane)","type":"City (Wasteland)","notes":"Explicitly unnamed; end-game loot zone"}],"traders":[{"name":"Rekt","specialty":"Food & Seeds","biome":"Pine Forest"},{"name":"Jen","specialty":"Medical supplies","biome":"Burnt Forest"},{"name":"Bob","specialty":"Tools & Vehicle parts","biome":"Desert"},{"name":"Hugh","specialty":"Weapons & Ammo","biome":"Snow"},{"name":"Joel","specialty":"Armor","biome":"Wasteland"}],"structures":["Campfire: cook food/drinks; holds Cooking Pot, Grill, or Beaker as implements","Forge: smelt ores (Iron/Lead/Brass/Stone/Sand/Clay), craft forged metal, nails, cement","Workbench: craft tools, weapons, mods, ammo, biome-hazard reducer items","Chemistry Station: faster/cheaper Glue, Gunpowder, acid, beakers, med crafting","Cement Mixer: bulk cement -> concrete mix for base upgrades","Traders: indestructible safe compounds, open 04:05-21:50, restock every 3 days","Land Claim Block & bedroll: reduce zombie spawns and set respawn point","Blocks: Wood frame -> Cobblestone -> Concrete/Rebar -> Steel upgrade path for base defense"],"mechanics":["Biome progression: start in Pine Forest, then push Burnt Forest -> Desert -> Snow -> Wasteland as gear/loot stage rise","Biome hazard timer (v2.x): non-forest biomes apply a hazard after ~3 min unless sheltered; a reducer item adds +5 min and +10% run speed","Biome Challenges unlock craftable survival gear granting full immunity to that biome's hazard","POI tier (T1-T7): higher tier = tougher sleeper volumes and better loot; trader quests gate you T1 upward","Quest types: Clear, Fetch, Fetch+Clear, Restore Power, Hidden Cache; rewards scale with tier","Loot stage & Gamestage rise with player level, days survived, and biome; Snow/Wasteland give the biggest loot bonuses","Landmark navigation: head to a Trader first (one spawns near most towns); use it as a base hub and quest source","Blood Moon horde every 7th day: build/reinforce a defensible base before nightfall"]},"firearms":{"category":"Firearms","note":"Stats from wiki.gg Weapons page. Gun damage triple = ball/AP/HP; shotgun triple = shell/slug/breach. RoF in rounds/min; range min-max by quality.","firearms":[{"name":"P r from solar cells","craft":"Loot solar cells; assemble","notes":"Quiet fuel-free power; cells are rare"},{"name":"Wire Tool","use":"Connects power sources to devices","craft":"Early electrical recipe","notes":"Essential for any powered setup"},{"name":"Electric Wire Relay","use":"Routes/extends wiring cleanly","craft":"Learn via magazines","notes":"Organize long wire runs"},{"name":"Switch","use":"Manual on/off for a circuit","craft":"Learn via magazines","notes":"Toggle lights/traps"},{"name":"Motion Sensor","use":"Triggers devices when enemies pass","craft":"Learn via magazines","notes":"Can filter friend vs foe"},{"name":"Pressure Plate","use":"Triggers devices when stepped on","craft":"Learn via magazines","notes":"Floor trigger for trap combos"},{"name":"Timer Relay","use":"Runs circuit only in a set time window","craft":"Learn via magazines","notes":"Auto-power traps for blood moon"},{"name":"Speaker","use":"Plays sound/alarm on trigger","craft":"Learn via magazines","notes":"Lure or alert use"},{"name":"Trip Wire","use":"Line trigger between two posts","craft":"Learn via magazines","notes":"Pairs with traps/alarms"},{"name":"Light (electric)","use":"Powered lighting for base","craft":"Early electrical recipe","notes":"Various colors/styles"}]},{"name":"Medical","items":[{"name":"Bandage","use":"Stops bleeding, small heal","craft":"Cloth; basic recipe","notes":"Earliest healing item"},{"name":"First Aid Bandage","use":"Better heal + stops bleeding","craft":"Bandage + herbal/med ingredients","notes":"Mid-tier heal"},{"name":"First Aid Kit","use":"Large instant heal","craft":"Learn via magazines; loot common","notes":"Best general healing item"},{"name":"Splint","use":"Treats broken/sprained legs","craft":"Wood/cloth; basic recipe","notes":"Cast is a stronger version"},{"name":"Painkillers","use":"Reduces pain/critical injuries","craft":"Loot or chemistry","notes":"Helps with debuffs"},{"name":"Antibiotics","use":"Cures infection","craft":"Loot pharmacy; craftable late","notes":"Honey/herbal antibiotics are alternatives"},{"name":"Herbal Antibiotics","use":"Early infection cure","craft":"Chrysanthemum + goldenrod + honey","notes":"Craftable substitute for pills"},{"name":"Vitamins","use":"Prevents dysentery/illness","craft":"Loot; chemistry","notes":"Buff duration"},{"name":"Honey","use":"Small heal, cures infection early","craft":"Harvest from tree stumps","notes":"Free early infection remedy"},{"name":"Blood Bag","use":"Restores health, used in recipes","craft":"Blood draw kit on self/loot","notes":"Ingredient for some meds"},{"name":"Aloe Cream / Vera","use":"Heals + treats burns","craft":"Aloe plant + chemistry","notes":"Grows in desert biome"}]},{"name":"Misc Tools","items":[{"name":"Repair Kit","use":"Repairs weapons/tools/armor in field","craft":"Learn via magazines; loot","notes":"Uses item durability, no forge needed"},{"name":"Lockpick","use":"Opens locked containers/safes","craft":"Learn via magazines","notes":"Can break; Lockpicking perk helps"},{"name":"Wrench","use":"Salvages parts from cars/appliances","craft":"Forged iron; gated by magazines","notes":"Ratchet/Impact Driver are upgrades"},{"name":"Ratchet","use":"Faster salvage than wrench","craft":"Learn via magazines","notes":"Mid-tier salvage tool"},{"name":"Impact Driver","use":"Fastest powered salvage tool","craft":"Learn via magazines; workbench","notes":"Endgame parts harvesting"},{"name":"Auger","use":"Powered mining, huge dig speed","craft":"Learn via magazines; needs gas","notes":"Fuel-hungry; best for stone/ore"},{"name":"Chainsaw","use":"Powered wood/tree harvesting","craft":"Learn via magazines; needs gas","notes":"Fast wood; loud"},{"name":"Nailgun","use":"Upgrades/repairs blocks in one hit","craft":"Learn via magazines","notes":"Finishes block upgrade single-shot"},{"name":"Claw Hammer","use":"Upgrades/repairs blocks (staged)","craft":"Early recipe","notes":"Core building tool"},{"name":"Flashlight","use":"Handheld/mounted light","craft":"Loot or craft; battery","notes":"Also a weapon mod"}]},{"name":"Schematics & Books-as-items","items":[{"name":"Treasure Map","use":"Marks buried supply cache to dig up","craft":"Loot; trader buried supply quests","notes":"Dig at circle center for reward"},{"name":"Skill Magazine (series)","use":"Reading unlocks/levels a recipe line","craft":"Loot, buy, crafting-table rewards","notes":"e.g. Forge Ahead, Wheels, Home Cooking"},{"name":"Schematic","use":"Instantly unlocks a specific recipe","craft":"Loot or buy from trader","notes":"One-time learn per schematic"},{"name":"Note / Quest Item","use":"Story/quest triggers and clues","craft":"Loot from POIs","notes":"Some start challenge quests"},{"name":"Skill Points Book (rare)","use":"Grants perk/skill boosts","craft":"Loot rare containers","notes":"approx; boosts progression"}]}]},"building":{"category":"Building Materials","note":"v1.0+/2.x trimmed the chain to 5 structural tiers (frame->wood->cobblestone->concrete->steel). Flagstone, Iron, Reinforced Wood and Reinforced Concrete intermediate tiers were removed; listed below as legacy/special. HP + mass are official-wiki cube values. Crafting a finished block costs the same as upgrading a placed one.","materials":[{"name":"Wood Frame (Building Block)","hp":"50","upgradesTo":"Wood Block","upgradeWith":"8 Wood w/ Claw Hammer or Nailgun","cost":"crafted from wood","notes":"Pick back up with E; ideal temporary scaffolding"},{"name":"Wood Block","hp":"500","upgradesTo":"Cobblestone Block","upgradeWith":"10 Cobblestone Rocks w/ hammer","cost":"8 Wood (or upgrade frame)","notes":"Mass 5; cheap early walls, burns/weak to fire"},{"name":"Cobblestone Block","hp":"1500","upgradesTo":"Concrete Block","upgradeWith":"10 Concrete Mix w/ hammer","cost":"10 Cobblestone Rocks","notes":"Mass 10; good cheap midgame tier"},{"name":"Concrete Block","hp":"5000","upgradesTo":"Steel Block","upgradeWith":"10 Forged Steel w/ hammer","cost":"10 Concrete Mix (needs cement mixer)","notes":"Mass 10; best value for bulk of a base"},{"name":"Steel Block","hp":"10000","upgradesTo":"(top tier)","upgradeWith":"n/a","cost":"10 Forged Steel","notes":"Mass 20; strongest, expensive to build+repair"},{"name":"Flagstone (legacy)","hp":"approx 1000","upgradesTo":"removed from chain","upgradeWith":"n/a in current build","cost":"stone","notes":"approx true; intermediate tier removed in 1.0+"},{"name":"Reinforced Concrete (legacy)","hp":"approx 6000","upgradesTo":"removed from chain","upgradeWith":"n/a in current build","cost":"rebar frame + concrete","notes":"approx true; folded out; concrete->steel is the modern step"},{"name":"Rebar Frame (special)","hp":"approx 300","upgradesTo":"poured concrete","upgradeWith":"concrete mix","cost":"iron","notes":"approx true; pourable formwork, availability varies by version"},{"name":"Iron Bars (special)","hp":"approx 1000","upgradesTo":"n/a","upgradeWith":"n/a","cost":"forged iron","notes":"approx; lets you/zombies shoot through; decorative/functional"},{"name":"Bulletproof Glass (special)","hp":"approx 3000","upgradesTo":"n/a","upgradeWith":"n/a","cost":"learned via magazines","notes":"approx; see-through wall that blocks bullets"}],"upgradePath":["Wood Frame (50 HP)","Wood Block (500 HP) — 8 Wood","Cobblestone Block (1500 HP) — 10 Cobblestone Rocks","Concrete Block (5000 HP) — 10 Concrete Mix","Steel Block (10000 HP) — 10 Forged Steel"],"mechanics":["Structural integrity = Max Load / Mass (rounded down); higher tiers cantilever farther.","A vertically supported block (traced to ground/bedrock/terrain) never collapses, no matter the mass on top.","Floors collapse from horizontal support limits: a wood face holds ~40 mass (about 8 wood blocks) before the run drops.","Fix caving spans by dropping a support pillar to the ground under the middle of the span.","Higher tiers have more mass, which limits reach but also raises HP and load capacity.","Horde base tip: outer/hit-facing blocks in concrete or steel, interior/roof in wood to save resources.","Funnel zombies into a narrow lane so damage lands on one hardened block; use ramps/wedges to control pathing.","Steel: 10000 HP but 10 Forged Steel each and costly to repair — reserve for the few blocks taking direct hits.","Repair with the same material as the block using Claw Hammer or Nailgun; repairing beats demolish+replace.","Land Claim Block reduces zombie block damage inside its radius and protects your base/storage in multiplayer.","Unclaimed player builds decay over time; keep a claim active to prevent decay.","Efficiency: crafting a finished Cobblestone/Concrete/Steel block costs the same mats as upgrading a placed one."]},"progression":{"category":"Tier Progression","note":"Vanilla upgrade paths per weapon/tool line. Quality (Q1-Q6) rises with crafting-skill level; the class jumps below are the real gear ladder. 'How' = how you obtain that tier.","weapons":[{"line":"Rifles","attribute":"Perception","perk":"Dead Eye","magazine":"Rifle World","ammo":"7.62mm","chain":[{"tier":"T0","name":"Pipe Rifle","how":"Craftable from scratch early; Rifle World lvl ~5","why":"Cheap single-shot to start"},{"tier":"T1","name":"Hunting Rifle","how":"Rifle World ~25 or loot/trader","why":"Solid single-shot, high per-hit"},{"tier":"T2","name":"Lever-Action Rifle","how":"Rifle World ~50 or loot/trader","why":"Faster follow-up shots"},{"tier":"T3","name":"Marksman / Sniper Rifle","how":"Rifle World ~75-100 or loot/trader","why":"Scoped long-range one-shots"}]},{"line":"Shotguns","attribute":"Strength","perk":"Boomstick","magazine":"Shotgun Weekly","ammo":"Shotgun Shells","chain":[{"tier":"T0","name":"Pipe Shotgun","how":"Craft early; Shotgun Weekly ~5","why":"Point-blank stopping power"},{"tier":"T1","name":"Double Barrel Shotgun","how":"Shotgun Weekly ~25 or loot","why":"Two barrels, big burst"},{"tier":"T2","name":"Pump Shotgun","how":"Shotgun Weekly ~50 or loot/trader","why":"Tube mag, sustained fire"},{"tier":"T3","name":"Auto Shotgun","how":"Shotgun Weekly ~75-1 tor lasting a real day can only sustain ~23W.","Split heavy loads across multiple Generator Banks on separate circuits to extend runtime.","Gate turrets/blades behind Motion Sensors so a 5W idle replaces constant 15-20W draw (saves battery).","Blood moon layout: funnel zombies down a 1-wide corridor lined with Dart Traps, an Electric Fence to slow, and Blade Traps at the end.","Use a Solar Bank charging a Battery Bank for silent, fuel-free 24h defense power.","Electric Fence Posts shock the player too - route wire away from your own path and re-check wires before horde night."]},"vehicles":{"category":"Vehicles","note":"Craft the sub-parts first, then assemble the vehicle at a Workbench. Part quality sets vehicle quality. Speeds in blocks/second (player sprint = 7).","vehicles":[{"name":"Bicycle","tier":"1","speed":"6 (8.5 sprint)","storage":"10","seats":1,"parts":["Wheel x2","Bicycle Chassis","Bicycle Handlebars","Mechanical Parts x1"],"partsCraftGate":"Grease Monkey perk (INT) / vehicle magazines; parts are cheap and early","assembleGate":"Workbench, or by hand in the inventory crafting window","fuel":"None (pedal power)","notes":"Cheapest first vehicle, no fuel. Low storage/speed. Explodes at high damage - can bait Demolishers."},{"name":"Minibike","tier":"2","speed":"7 (9.2 sprint)","storage":"30","seats":1,"parts":["Wheel x2","Minibike Chassis","Minibike Handlebars","Engine","Lead Car Battery"],"partsCraftGate":"Grease Monkey perk / vehicle magazines; needs Engine + Lead Car Battery","assembleGate":"Workbench","fuel":"Gas (tank 1000 units)","notes":"Solid mid-game hauler, 30 slots, 3 mod slots. First engine-powered ride."},{"name":"Motorcycle","tier":"3","speed":"9.8 (14 sprint)","storage":"40","seats":1,"parts":["Wheel x2","Motorcycle Chassis","Motorcycle Handlebars","Engine","Lead Car Battery"],"partsCraftGate":"Grease Monkey perk / vehicle magazines","assembleGate":"Workbench","fuel":"Gas (tank 3000 units)","notes":"Fast single-rider, 40 slots, 4 mod slots. function blankMember(name){return{name:name||"Survivor",level:1,status:"offline",gamertag:"",
  attributes:{Perception:1,Strength:1,Fortitude:1,Agility:1,Intellect:1},
  perks:{},general:{},supplies:{},books:{},roles:{}};}

function load(){let s=null;try{s=JSON.parse(localStorage.getItem(LS));}catch(e){}
  if(!s||!s.crew||!s.crew.length)s={crew:[blankMember("Survivor 1")],active:0};
  if(s.crewName==null)s.crewName="My Crew";
  if(!Array.isArray(s.schedule))s.schedule=[];
  s.crew.forEach(c=>{if(c.status==null)c.status="offline";if(c.gamertag==null)c.gamertag="";if(!c.roles)c.roles={};});
  return s;}

function save(){try{localStorage.setItem(LS,JSON.stringify(STATE));}catch(e){}}
function member(){return STATE.crew[STATE.active];}

/* ---------- perk economy ---------- */
const ATTR_CUM=DB.perks.economy.attributeCumulativeCost;
function attrCost(m){let c=0;for(const a in m.attributes)c+=ATTR_CUM[m.attributes[a]-1];return c;}
function perkKey(att,perk){return att+"::"+perk;}
function findPerk(att,name){const A=DB.perks.attributes.find(x=>x.name===att);return A&&A.perks.find(p=>p.name===name);}
function perkSpent(m){let c=0;
  for(const k in m.perks){c+=m.perks[k];} // attr perks 1/rank
  for(const gn in m.general){const g=DB.perks.general.find(x=>x.name===gn);if(!g)continue;
    for(let r=1;r<=m.general[gn];r++){c+=(g.ranks[r-1].cost||1);}}
  return c;}
function totalSpent(m){return attrCost(m)+perkSpent(m);}
function budget(m){return m.level;} // 1 skill point per level

function currentRank(att,perk,isGen){const m0=member();
  return isGen?(m0.general[perk]||0):(m0.perks[perkKey(att,perk)]||0);}
function setRank(att,perk,isGen,r){const m0=member();
  if(isGen){if(r<=0)delete m0.general[perk];else m0.general[perk]=r;}
  else{const k=perkKey(att,perk);if(r<=0)delete m0.perks[k];else m0.perks[k]=r;}
  save();}
function perkCard(att,p,isGen){
  const m0=member();const maxR=p.maxRank||p.ranks.length;
  const card=el("div","perkcard");card.dataset.k=att+"|"+p.name;
  const cur=currentRank(att,p.name,isGen);
  // gating: attribute perks need attribute >= rank.att for next rank
  const ph=el("div","ph");
  const left=el("div");left.innerHTML=`<div class="pn">${esc(p.name)}</div><div class="pd">${esc(p.desc)}</div>`;
  const pips=el("div","pips");
  for(let i=1;i<=maxR;i++){
    const pip=el("div","pip"+(i<=cur?" on":""));
    if(!isGen&&p.ranks[i-1].att>m0.attributes[att])pip.classList.add("locked");
    pips.appendChild(pip);
  }
  ph.appendChild(left);ph.appendChild(pips);
  card.appendChild(ph);
  const body=el("div","perkbody"+(openPerk===card.dataset.k?" open":""));
  const ul=el("ul","ranklist");
  p.ranks.forEach(r=>{
    const li=el("li");
    const gate=isGen?`<span class="tag warn">${r.cost||1} pt</span>`:`<span class="tag att">${att.slice(0,3).toUpperCase()} ${r.att}</span>`;
    li.innerHTML=`<span class="rk">R${r.rank}</span><span class="gate">${gate}</span><span class="ef">${esc(r.effect)}</span>`;
    if(r.rank<=cur)li.style.opacity=1;else li.style.opacity=.7;
    ul.appendChild(li);
  });
  body.appendChild(ul);
  const meta=el("div","note");
  meta.style.marginTop="6px";
  let mtxt=[];
  if(p.magazine)mtxt.push("Boosts loot: <b>"+esc(p.magazine)+"</b> magazines");
  if(p.unlocks&&p.unlocks!=="none")mtxt.push("Unlocks: "+esc(p.unlocks));
  meta.innerHTML=mtxt.join(" · ")||"No craftable unlocks — pure stat perk.";
  body.appendChild(meta);
  const btns=el("div","rowbtns");
  const buy=el("button","btn","▲ Buy rank");
  const ref=el("button","btn red","▼ Refund");
  buy.onclick=e=>{e.stopPropagation();const c=currentRank(att,p.name,isGen);
    if(c>=maxR)return;
    if(!isGen&&p.ranks[c].att>m0.attributes[att]){flash(buy,"Need "+att+" "+p.ranks[c].att);return;}
    setRank(att,p.name,isGen,c+1);updateBuilder();};
  ref.onclick=e=>{e.stopPropagation();const c=currentRank(att,p.name,isGen);if(c>0){setRank(att,p.name,isGen,c-1);updateBuilder();}};
  btns.appendChild(buy);btns.appendChild(ref);body.appendChild(btns);
  card.appendChild(body);
  ph.onclick=()=>{openPerk=(openPerk===card.dataset.k)?null:card.dataset.k;
    document.querySelectorAll(".perkbody.open").forEach(b=>{if(b!==body)b.classList.remove("open");});
    body.classList.toggle("open");};
  // disable buy if locked/maxed
  const nextLocked=(!isGen&&cur<maxR&&p.ranks[cur].att>m0.attributes[att]);
  if(cur>=maxR)buy.disabled=true;
  if(nextLocked){buy.classList.add("amber");buy.textContent="🔒 "+att+" "+p.ranks[cur].att+" req";}
  if(cur===0)ref.disabled=true;
  if(nextLocked&&cur===0)card.classList.add("perk-locked");
  return card;
}
function flash(btn,msg){const old=btn.textContent;btn.textContent=msg;setTimeout(()=>btn.textContent=old,1100);}
function normalize(m){ // auto-refund ranks above attribute gate
  for(const k in m.perks){const [att,name]=k.split("::");const p=findPerk(att,name);if(!p)continue;
    let r=m.perks[k];while(r>0&&p.ranks[r-1].att>m.attributes[att])r--;
    if(r<=0)delete m.perks[k];else m.perks[k]=r;}
}
function refreshBudget(){
  const m0=member();const bw=$("#budgetwrap");if(!bw)return;
  const b=budget(m0),s=totalSpent(m0),rem=b-s,over=rem<0;
  const pct=Math.min(100,Math.round(s/Math.max(b,1)*100));
  bw.innerHTML=`<div class="grp-h">SKILL POINT BUDGET</div>
  <div class="budget">
    <span>Level <b>${m0.level}</b></span>
    <span>Spent <b>${s}</b></span>
    <span>Free <b class="${over?'over':'ok'}">${rem}</b></span>
    <div class="bar${over?' over':''}"><i style="width:${pct}%"></i></div>
  </div>
  <div class="note">Attributes cost ${attrCost(m0)} pts · Perks cost ${perkSpent(m0)} pts${over?' · <span style="color:var(--red)">OVER BUDGET — raise level or refund</span>':''}</div>`;
}

}

/* ---------- COOKBOOK ---------- */
function pgCookbook(m){
  const D=DB.cookbook;head(m,"COOKBOOK","recipes --show-ingredients");
  const intro=el("div","crtwrap");
  intro.innerHTML="<div class='grp-h'>FIELD KITCHEN</div><p>Every craftable food and drink with the exact ingredients it needs. "+
    "Ingredient counts shown are base cost &mdash; <b>Master Chef</b> cuts main ingredients by up to 40%. "+
    "Cook recipes unlock as you read <b>Home Cooking Weekly</b> magazines.</p>"+
    (D.note?`<div class="note">${esc(D.note)}</div>`:"");
  m.appendChild(intro);
  const tiers=[["basic","STARTER MEALS"],["mid","MAIN DISHES"],["advanced","ADVANCED / SPECIALTY"],["drink","DRINKS"],["elixir","GRANDPA'S BREWS"],["other","OTHER"]];
  const w=el("div","crtwrap");w.appendChild(searchFilter(w,"search recipe or ingredient…"));
  const byTier={};(D.recipes||[]).forEach(r=>{let t=(r.tier||"other").toLowerCase();
    if(/drink|tea|coffee|juice|water|crush|smoothie/.test((r.tier||"")+r.name)&&!/elixir|moonshine/.test(r.name))t=t==="basic"||t==="mid"||t==="advanced"?t:"drink";
    if(/moonshine|elixir|awesome sauce/.test(r.name.toLowerCase()))t="elixir";
    (byTier[t]=byTier[t]||[]).push(r);});
  // ensure recipes not matched land in 'other'
  const shown=new Set();
  tiers.forEach(([key,label])=>{
    const list=byTier[key];if(!list||!list.length)return;
    w.appendChild(el("div","grp-h",label));
    const grid=el("div","cardgrid");
    list.forEach(r=>{shown.add(r);grid.appendChild(recipeCard(r));});
    w.appendChild(grid);
  });
  // any leftover tiers
  Object.keys(byTier).forEach(k=>{if(tiers.find(t=>t[0]===k))return;
    w.appendChild(el("div","grp-h",k.toUpperCase()));
    const grid=el("div","cardgrid");byTier[k].forEach(r=>grid.appendChild(recipeCard(r)));w.appendChild(grid);});
  m.appendChild(w);
}
function recipeCard(r){
  const c=el("div","perkcard");
  const stats=[];
  if(r.fullness!=null&&r.fullness!=="")stats.push(`🍖 ${esc(r.fullness)}`);
  if(r.water!=null&&r.water!=="")stats.push(`💧 ${esc(r.water)}`);
  if(r.health!=null&&r.health!=="")stats.push(`❤ ${esc(r.health)}`);
  const head=el("div","ph");head.style.cursor="default";
  head.innerHTML=`<div><div class="pn">${esc(r.name)}${r.approx?' <span class="tag warn">approx</span>':''}</div>`+
    `<div class="pd">${esc(r.station||"")}</div></div>`+
    `<div class="note" style="text-align:right">${stats.join("&nbsp; ")}</div>`;
  c.appendChild(head);
  const body=el("div","perkbody open");body.style.maxHeight="none";
  let ing=(r.ingredients||[]).map(i=>`<li>${esc(i)}</li>`).join("");
  body.innerHTML=`<div style="color:var(--amber);font-size:11px;letter-spacing:.08em;margin:2px 0 3px">INGREDIENTS</div>`+
    `<ul style="margin:0 0 8px;padding-left:18px;font-size:12.5px">${ing||"<li class='note'>Loot only</li>"}</ul>`+
    (r.effects?`<div class="note">Effects: ${esc(r.effects)}</div>`:"")+
    (r.stamina?`<div class="note">Stamina: ${esc(r.stamina)}</div>`:"")+
    (r.unlock?`<div style="margin-top:5px"><span class="tag warn">${esc(r.unlock)}</span></div>`:"");
  c.appendChild(body);
  return c;
}

    }
    out.innerHTML="<div class='grp-h'>ESTIMATED NIGHT-7 THREAT (gamestage ~"+G+")</div>"+
      `<div class="metricrow">
        <div class="metric"><div class="k">MAX ALIVE AT ONCE</div><div class="v">${maxAlive}</div></div>
        <div class="metric"><div class="k">TOTAL WAVE (approx)</div><div class="v">${est}</div></div>
        ${ammoCard}
      </div>`+
      `<table>
        <tr><th>Factor</th><th>Recommendation</th></tr>
        ${ammoRow}
        <tr><td>Recommended base tier</td><td>${tier}</td></tr>
        <tr><td>Special enemies expected</td><td>${G<50?'Mostly walkers/runners':G<150?'Cops, ferals, radiated':'Demolishers, radiated hordes — keep melee/explosives for demos!'}</td></tr>
        <tr><td>Feral sense</td><td>${esc(fs.value)} (×${feralMult} pressure)</td></tr>
      </table>`+
      `<div class="warnbox">Estimates use a simplified public gamestage model — treat as a planning guide, not exact spawn counts. Overstock ammo by ~25%.</div>`;
  }
  [day,pl,gs].forEach(inp=>{inp.oninput=recalc;});
  fs.onchange=recalc;wp.onchange=recalc;
  recalc();
}
function suggestWeaponLine(m0){
  const map={"Dead Eye":"Rifles","Boomstick":"Shotguns","Gunslinger":"Handguns / SMG","Machine Gunner":"Machine Guns",
    "Archery":"Bows & Crossbows","Pummel Pete":"Clubs & Bats","Skull Crusher":"Sledgehammers","Deep Cuts":"Knives / Blades",
    "Spear Master":"Spears","The Brawler":"Knuckles / Fists","Electrocutioner":"Stun Batons (Robotic)"};
  let best=null,bestR=0;
  for(const k in m0.perks){const name=k.split("::")[1];if(map[name]&&m0.perks[k]>bestR){bestR=m0.perks[k];best=map[name];}}
  return best;
}

let SEARCHQ="";
let SEARCHIDX=null;
const PAGELABEL={};PAGES.forEach(p=>PAGELABEL[p.id]=p.label);
function pushIdx(idx,name,page,sub){if(name)idx.push({name:String(name),page:page,sub:sub||""});}
function buildSearchIndex(){
  if(SEARCHIDX)return SEARCHIDX;
  const x=[];
  (DB.perks.attributes||[]).forEach(A=>A.perks.forEach(p=>pushIdx(x,p.name,"builder",A.name+" perk — "+(p.desc||""))));
  (DB.perks.general||[]).forEach(p=>pushIdx(x,p.name,"builder","General perk"));
  (DB.weapons.groups||[]).forEach(g=>g.items.forEach(it=>pushIdx(x,it.name,"weapons",g.name)));
  (DB.firearms.firearms||[]).forEach(f=>pushIdx(x,f.name,"firearms",(f.class||"")+" — "+(f.ammo||"")));
  (DB.ammunition.ammo||[]).forEach(a=>pushIdx(x,a.name,"ammunition",a.type||"ammo"));
  (DB.tools.groups||[]).forEach(g=>g.items.forEach(it=>pushIdx(x,it.name,"tools",g.name)));
  (DB.armor.sets||[]).forEach(s=>pushIdx(x,s.name,"armor",(s.class||"")+" armor set"));
  (DB.armor.mods||DB.armor.armorMods||[]).forEach(mm=>pushIdx(x,mm.name,"armor","armor mod"));
  (DB.mods.groups||[]).forEach(g=>g.items.forEach(it=>pushIdx(x,it.name,"mods",g.name)));
  (DB.books.craftingMagazines||[]).forEach(b=>pushIdx(x,b.series,"books","magazine series"));
  (DB.books.bookSets||[]).forEach(b=>pushIdx(x,b.name,"books","perk book set"));
  (DB.crafting.stations||[]).forEach(s=>pushIdx(x,s.name,"crafting","workstation"));
  (DB.crafting.keyMaterials||[]).forEach(s=>pushIdx(x,s.name,"crafting","material"));
  (DB.cookbook.recipes||[]).forEach(r=>pushIdx(x,r.name,"cookbook",(r.station||"")+" recipe"));
  (DB.food.items||[]).forEach(it=>pushIdx(x,it.name,"food",it.type||"consumable"));
  ["positive","negative","environmental"].forEach(k=>(DB.buffs[k]||[]).forEach(b=>pushIdx(x,b.name,"buffs",k+" effect")));
  (DB.farming.crops||[]).forEach(c=>pushIdx(x,c.name,"farming","crop"));
  (DB.resources.groups||[]).forEach(g=>g.items.forEach(it=>pushIdx(x,it.name,"resources",g.name)));
  (DB.mining.ores||[]).forEach(o=>pushIdx(x,o.name,"mining","ore"));
  (DB.mining.gatherables||[]).forEach(o=>pushIdx(x,o.name,"mining","gatherable"));
  (DB.building.materials||[]).forEach(o=>pushIdx(x,o.name,"building","building block"));
  (DB.items.groups||[]).forEach(g=>g.items.forEach(it=>pushIdx(x,it.name,"items",g.name)));
  (DB.zombies.zombies||[]).forEach(z=>pushIdx(x,z.name,"zombies",(z.threat||"")+" threat"));
  (DB.zombies.animals||[]).forEach(z=>pushIdx(x,z.name,"zombies","animal"));
  ((DB.world&&DB.world.biomes)||[]).forEach(b=>pushIdx(x,b.name,"locations","biome"));
  ((DB.world&&DB.world.namedLocations)||[]).forEach(b=>pushIdx(x,b.name,"locations",b.type||"landmark"));
  ((DB.world&&DB.world.traders)||[]).forEach(b=>pushIdx(x,b.name,"locations","trader"));
  (DB.prefabs.groups||[]).forEach(g=>(g.pois||[]).forEach(p=>pushIdx(x,p.name,"prefabs",g.name)));
  (DB.progression.weapons||[]).forEach(l=>pushIdx(x,l.line,"progression","weapon line"));
  (DB.progression.tools||[]).forEach(l=>pushIdx(x,l.line,"progression","tool line"));
  SEARCHIDX=x;return x;
}
function runSearch(q){
  q=(q||"").trim().toLowerCase();
  const m=$("#main");
  if(q.length<2){if(current)render();return;}
  const idx=buildSearchIndex();
  const starts=[],incl=[];
  idx.forEach(e=>{const n=e.name.toLowerCase();if(n.startsWith(q))starts.push(e);else if(n.includes(q)||e.sub.toLowerCase().includes(q))incl.push(e);});
  const hits=starts.concat(incl).slice(0,60);
  m.innerHTML="";
  const w=el("div","crtwrap");
  w.appendChild(el("div","pg-h","SEARCH"));
  w.appendChild(el("div","pg-sub",`<span class="prompt">grep -ri "${esc(q)}"</span> — ${hits.length} match${hits.length===1?"":"es"}${hits.length>=60?" (showing first 60)":""}`));
  const list=el("div","srlist");
  if(!hits.length)list.appendChild(el("div","note","No matches. Try a shorter term."));
  hits.forEach(h=>{
    const row=el("div","srhit");
    row.innerHTML=`<div><div class="nm">${esc(h.name)}</div><div class="sub">${esc(h.sub)}</div></div><div class="pg">${esc(PAGELABEL[h.page]||h.page)} ▶</div>`;
    row.onclick=()=>{SEARCHQ="";const gi=$("#globalsearch");if(gi)gi.value="";go(h.page);};
    list.appendChild(row);
  });
  w.appendChild(list);m.appendChild(w);
}

/* ---------- BUILD SHARING ---------- */
function encodeBuild(c){
  const payload={n:c.name,l:c.level,a:c.attributes,p:c.perks,g:c.general,s:c.supplies,r:c.roles};
  try{return btoa(unescape(encodeURIComponent(JSON.stringify(payload))));}catch(e){return"";}
}
function shareLink(c){
  const base=location.origin+location.pathname;
  return base+"#b="+encodeBuild(c);
}
function decodeBuild(code){
  try{const o=JSON.parse(decodeURIComponent(escape(atob(code))));
    const nm=blankMember(o.n||"Imported");
    nm.level=o.l||1;nm.attributes=Object.assign(nm.attributes,o.a||{});
    nm.perks=o.p||{};nm.general=o.g||{};nm.supplies=o.s||{};nm.roles=o.r||{};
    normalize(nm);return nm;
  }catch(e){return null;}
}
function checkImport(){
  const h=location.hash||"";
  if(h.indexOf("#b=")===0){
    const code=h.slice(3);const nm=decodeBuild(code);
    history.replaceState(null,"",location.pathname+location.search);
    if(nm&&confirm('Import shared build "'+nm.name+'" (Lv '+nm.level+') as a new survivor?')){
      STATE.crew.push(nm);STATE.active=STATE.crew.length-1;save();
    }
    return;
  }
  if(h.indexOf("#c=")===0){
    const code=h.slice(3);history.replaceState(null,"",location.pathname+location.search);
    if(confirm("Join / sync this crew? This merges the shared roster and play schedule into your terminal.")){
      if(importCrew(code))current="crewhub";
    }
    return;
  }
  if(h.indexOf("#p=")===0){
    const id=h.slice(3);
    if(PAGES.some(p=>p.id===id))current=id;
  }
}

/* ---- crew invite (whole roster + schedule) ---- */
function encodeCrew(){
  const payload={cn:STATE.crewName,
    c:STATE.crew.map(m=>({n:m.name,l:m.level,st:m.status,gt:m.gamertag,a:m.attributes,p:m.perks,g:m.general,r:m.roles})),
    sc:STATE.schedule};
  try{return btoa(unescape(encodeURIComponent(JSON.stringify(payload))));}catch(e){return"";}
}
function crewInviteLink(){return location.origin+location.pathname+"#c="+encodeCrew();}
function importCrew(code){
  let o;try{o=JSON.parse(decodeURIComponent(escape(atob(code))));}catch(e){return false;}
  if(!o||!o.c)return false;
  if(o.cn)STATE.crewName=o.cn;
  const byName={};STATE.crew.forEach((m,i)=>byName[m.name.toLowerCase()]=i);
  (o.c||[]).forEach(mm=>{
    const nm=blankMember(mm.n);nm.level=mm.l||1;nm.status=mm.st||"offline";nm.gamertag=mm.gt||"";
    nm.attributes=Object.assign(nm.attributes,mm.a||{});nm.perks=mm.p||{};nm.general=mm.g||{};nm.roles=mm.r||{};
    normalize(nm);
    const k=nm.name.toLowerCase();
    if(byName[k]!=null)STATE.crew[byName[k]]=nm; else {STATE.crew.push(nm);byName[k]=STATE.crew.length-1;}
  });
  // merge schedule by id
  const sc=STATE.schedule||[];const idmap={};sc.forEach((s,i)=>idmap[s.id]=i);
  (o.sc||[]).forEach(s=>{if(idmap[s.id]!=null){const ex=sc[idmap[s.id]];ex.rsvp=Object.assign(ex.rsvp||{},s.rsvp||{});ex.when=s.when;ex.note=s.note;}else sc.push(s);});
  STATE.schedule=sc;save();return true;
}
function doInvite(){
  const link=crewInviteLink();
